# =============================================================================
#  Secret Cloudflare API Token — utilisé par cert-manager pour les challenges DNS01
#
#  Créer un token sur https://dash.cloudflare.com/profile/api-tokens
#  Permissions requises : Zone > DNS > Edit  (pour la zone my-memo-master.com)
#
#  Remplacer YOUR_CLOUDFLARE_API_TOKEN puis appliquer :
#    kubectl apply -f k8s/cert-manager/cloudflare-secret.yml
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
type: Opaque
stringData:
  api-token: YOUR_CLOUDFLARE_API_TOKEN

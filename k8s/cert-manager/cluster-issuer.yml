# =============================================================================
#  ClusterIssuer Let's Encrypt — staging (test) + prod
#
#  Toujours tester avec le staging issuer d'abord pour éviter le rate limit
#  Let's Encrypt prod (5 certificats/domaine/semaine).
#
#  Appliquer :
#    kubectl apply -f cluster-issuer.yml
#
#  Remplacer LETSENCRYPT_EMAIL par l'adresse réelle avant d'appliquer.
# =============================================================================

# ── Staging (tests) ───────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: LETSENCRYPT_EMAIL
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik

---

# ── Production ────────────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: LETSENCRYPT_EMAIL
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik

# =============================================================================
#  ClusterIssuer Let's Encrypt — DNS01 via webhook Infomaniak
#
#  Prérequis :
#    - Secret infomaniak-api-token dans le namespace cert-manager
#    - Webhook cert-manager-webhook-infomaniak installé
#
#  Appliquer :
#    kubectl apply -f cluster-issuer.yml
#
#  Remplacer LETSENCRYPT_EMAIL avant d'appliquer
#  (le setup.sh le fait automatiquement via sed).
# =============================================================================

# ── Staging (tests) ───────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: LETSENCRYPT_EMAIL
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.infomaniak.com
            solverName: infomaniak
            config:
              apiTokenSecretRef:
                name: infomaniak-api-credentials
                key: api-token

---

# ── Production ────────────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: LETSENCRYPT_EMAIL
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.infomaniak.com
            solverName: infomaniak
            config:
              apiTokenSecretRef:
                name: infomaniak-api-credentials
                key: api-token

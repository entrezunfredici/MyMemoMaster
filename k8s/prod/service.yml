# =============================================================================
#  Services prod — MyMemoMaster
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: mmm-prod-postgres
  namespace: mymemomaster
spec:
  type: ClusterIP
  selector:
    app: mmm-prod-postgres
  ports:
    - port: 5432
      targetPort: 5432

---

apiVersion: v1
kind: Service
metadata:
  name: mmm-prod-redis
  namespace: mymemomaster
spec:
  type: ClusterIP
  selector:
    app: mmm-prod-redis
  ports:
    - port: 6379
      targetPort: 6379

---

apiVersion: v1
kind: Service
metadata:
  name: mmm-prod-api
  namespace: mymemomaster
spec:
  type: ClusterIP
  selector:
    app: mmm-prod-api
  ports:
    - port: 80
      targetPort: 3000

---

apiVersion: v1
kind: Service
metadata:
  name: mmm-prod-front
  namespace: mymemomaster
spec:
  type: ClusterIP
  selector:
    app: mmm-prod-front
  ports:
    - port: 80
      targetPort: 80

# =============================================================================
#  Helm values — Traefik ingress controller (k8s)
#
#  Installation :
#    helm repo add traefik https://traefik.github.io/charts
#    helm repo update
#    helm install traefik traefik/traefik \
#      --namespace traefik --create-namespace \
#      -f values.yml
# =============================================================================

# Expose les ports 80 (HTTP) et 443 (HTTPS) via un LoadBalancer
service:
  type: LoadBalancer

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
    protocol: TCP
  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP
    tls:
      enabled: true

# IngressClass : permet de cibler ce Traefik depuis les Ingress
ingressClass:
  enabled: true
  isDefaultClass: true

# Activer le provider Kubernetes Ingress (standard) + CRD (IngressRoute)
providers:
  kubernetesIngress:
    enabled: true
    publishedService:
      enabled: true
  kubernetesCRD:
    enabled: true

# Logs
logs:
  general:
    level: INFO
  access:
    enabled: true

# Désactiver le dashboard en prod (activer si besoin pour debug)
api:
  dashboard: false
  insecure: false

# Ressources
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

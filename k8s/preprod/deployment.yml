# =============================================================================
#  Deployments preprod — MyMemoMaster
#
#  Prérequis sur le cluster :
#    - Namespace mymemomaster-preprod créé (k8s/preprod/namespace.yml)
#    - Secret mmm-preprod-secrets créé (voir k8s/preprod/configmap.yml)
#    - ConfigMap mmm-preprod-config créée (k8s/preprod/configmap.yml)
#
#  Migration depuis l'ancienne preprod (namespace default) :
#    1. Appliquer ces manifests : kubectl apply -f k8s/preprod/
#    2. Vérifier que les pods sont Running
#    3. Supprimer les anciennes ressources : kubectl delete -f k8s/app/ingress-test.yml
#       et nettoyer les anciens deployments dans namespace default
# =============================================================================

# ── PostgreSQL (StatefulSet + PVC) ────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mmm-preprod-postgres
  namespace: mymemomaster-preprod
spec:
  serviceName: mmm-preprod-postgres
  replicas: 1
  selector:
    matchLabels:
      app: mmm-preprod-postgres
  template:
    metadata:
      labels:
        app: mmm-preprod-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mmm-preprod-secrets
                  key: PG_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mmm-preprod-secrets
                  key: PG_PASS
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: mmm-preprod-config
                  key: PG_DB
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi

---

# ── Redis (Deployment — données éphémères acceptables en preprod) ──────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mmm-preprod-redis
  namespace: mymemomaster-preprod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mmm-preprod-redis
  template:
    metadata:
      labels:
        app: mmm-preprod-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - /bin/sh
            - -c
            - |
              if [ -n "$REDIS_PASS" ]; then
                exec redis-server --requirepass "$REDIS_PASS"
              else
                exec redis-server
              fi
          env:
            - name: REDIS_PASS
              valueFrom:
                secretKeyRef:
                  name: mmm-preprod-secrets
                  key: REDIS_PASS
                  optional: true
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

---

# ── API Node.js ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mmm-preprod-api
  namespace: mymemomaster-preprod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mmm-preprod-api
  template:
    metadata:
      labels:
        app: mmm-preprod-api
    spec:
      containers:
        - name: api
          image: fredissimo/mymemomaster_preprod_api:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: mmm-preprod-config
            - secretRef:
                name: mmm-preprod-secrets
          env:
            # Hostnames internes au cluster — surchargent les valeurs du ConfigMap
            - name: PG_HOST
              value: mmm-preprod-postgres
            - name: REDIS_HOST
              value: mmm-preprod-redis
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---

# ── Frontend Vue 3 (nginx) ────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mmm-preprod-front
  namespace: mymemomaster-preprod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mmm-preprod-front
  template:
    metadata:
      labels:
        app: mmm-preprod-front
    spec:
      containers:
        - name: front
          image: fredissimo/mymemomaster_preprod_front:latest
          imagePullPolicy: Always
          command:
            - /bin/sh
            - -c
            - |
              set -e
              cat > /usr/share/nginx/html/config.js << EOF
              window.__APP_CONFIG__ = {
                API_URL: "${VITE_API_URL}",
                FRONT_URL: "${VITE_FRONT_URL}"
              };
              EOF
              if ! grep -q '/config.js' /usr/share/nginx/html/index.html; then
                sed -i '/type="module"/i \  <script src="/config.js"></script>' /usr/share/nginx/html/index.html
              fi
              exec nginx -g 'daemon off;'
          envFrom:
            - configMapRef:
                name: mmm-preprod-config
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 256Mi

---

# ── PgAdmin (optionnel — administration PostgreSQL) ───────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mmm-preprod-pgadmin
  namespace: mymemomaster-preprod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mmm-preprod-pgadmin
  template:
    metadata:
      labels:
        app: mmm-preprod-pgadmin
    spec:
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:8
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: mmm-preprod-config
                  key: PGADMIN_DEFAULT_EMAIL
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mmm-preprod-secrets
                  key: PGADMIN_DEFAULT_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

# =============================================================================
#  Ingress preprod — MyMemoMaster
#
#  Domaines : preprod-api.my-memo-master.com / preprod.my-memo-master.com
#  Namespace : mymemomaster-preprod
#  SSL : Let's Encrypt via cert-manager + Cloudflare DNS01
#
#  Prérequis :
#    - ingress-nginx installé sur le cluster
#    - cert-manager installé
#    - k8s/cert-manager/cloudflare-secret.yml appliqué
#    - k8s/cert-manager/cluster-issuer-cloudflare.yml appliqué
#    - Mode SSL Cloudflare réglé sur "Full" (pas "Full strict")
#
#  Appliquer :
#    kubectl apply -f k8s/preprod/
#
#  Vérifier les certificats :
#    kubectl get certificate -n mymemomaster-preprod
#    kubectl describe certificate mmm-preprod-api-tls -n mymemomaster-preprod
# =============================================================================

# ── API ───────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mmm-preprod-api
  namespace: mymemomaster-preprod
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-cloudflare
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - preprod-api.my-memo-master.com
      secretName: mmm-preprod-api-tls
  rules:
    - host: preprod-api.my-memo-master.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mmm-preprod-api
                port:
                  number: 80

---

# ── Frontend ──────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mmm-preprod-front
  namespace: mymemomaster-preprod
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-cloudflare
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - preprod.my-memo-master.com
      secretName: mmm-preprod-front-tls
  rules:
    - host: preprod.my-memo-master.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mmm-preprod-front
                port:
                  number: 80

---

# ── PgAdmin (accès optionnel) ──────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mmm-preprod-pgadmin
  namespace: mymemomaster-preprod
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-cloudflare
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - preprod-pgadmin.my-memo-master.com
      secretName: mmm-preprod-pgadmin-tls
  rules:
    - host: preprod-pgadmin.my-memo-master.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mmm-preprod-pgadmin
                port:
                  number: 80

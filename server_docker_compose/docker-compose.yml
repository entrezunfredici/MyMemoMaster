# =============================================================================
#  MyMemoMaster — server_docker_compose/docker-compose.yml
#
#  Fichier déployé sur le VPS par le pipeline CD.
#  À utiliser avec le fichier .env du serveur (copier .env.example → .env).
#
#  Usage VPS :
#    docker compose --env-file .env pull
#    docker compose --env-file .env up -d postgres
#    docker compose --env-file .env up -d pgadmin api front
#
#  Prérequis VPS :
#    - Réseau Docker "traefik_proxy" existant (Traefik déjà en cours)
#    - Certificats Let's Encrypt gérés par Traefik (certresolver=letsencrypt)
#    - Variables .env renseignées (copier .env.example → .env et remplir)
# =============================================================================

services:

  # ═══════════════════════════════════════════════════════════════════════════
  #  Base de données PostgreSQL
  # ═══════════════════════════════════════════════════════════════════════════

  redis:
    image: redis:7-alpine
    command: >
      sh -c "if [ -n '${REDIS_PASS}' ]; then redis-server --requirepass ${REDIS_PASS}; else redis-server; fi"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: ${REDIS_LIMIT_CPUS:-0.25}
          memory: ${REDIS_LIMIT_MEMORY:-128M}
        reservations:
          cpus: ${REDIS_RESERVE_CPUS:-0.10}
          memory: ${REDIS_RESERVE_MEMORY:-32M}
    networks:
      - mmm_network
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_DB: ${PG_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: ${POSTGRES_LIMIT_CPUS:-0.50}
          memory: ${POSTGRES_LIMIT_MEMORY:-1024M}
        reservations:
          cpus: ${POSTGRES_RESERVE_CPUS:-0.25}
          memory: ${POSTGRES_RESERVE_MEMORY:-256M}
    networks:
      - mmm_network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  #  PgAdmin — interface d'administration PostgreSQL
  # ═══════════════════════════════════════════════════════════════════════════

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: ${PGADMIN_LIMIT_CPUS:-0.25}
          memory: ${PGADMIN_LIMIT_MEMORY:-256M}
        reservations:
          cpus: ${PGADMIN_RESERVE_CPUS:-0.10}
          memory: ${PGADMIN_RESERVE_MEMORY:-64M}
    labels:
      - traefik.enable=true
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin.rule=Host(`${PGADMIN_DOMAIN}`)
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin.entrypoints=websecure
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin.tls.certresolver=letsencrypt
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin.middlewares=mmm-${ENVIRONMENT}-hsts
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin-http.rule=Host(`${PGADMIN_DOMAIN}`)
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin-http.entrypoints=web
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin-http.middlewares=mmm-${ENVIRONMENT}-https-redirect
      - traefik.http.services.mmm-${ENVIRONMENT}-pgadmin.loadbalancer.server.port=80
      - traefik.docker.network=traefik_proxy
    networks:
      - mmm_network
      - traefik_proxy
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  #  API Node.js — image tirée de DockerHub
  # ═══════════════════════════════════════════════════════════════════════════

  api:
    image: ${IMAGE_API}
    volumes:
      - api-data:/app/data
    environment:
      NODE_ENV: production
      ENVIRONMENT: ${ENVIRONMENT}
      API_PORT: ${API_PORT:-3000}
      PG_HOST: postgres
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER}
      PG_PASS: ${PG_PASS}
      PG_DB: ${PG_DB}
      DB_SYNC_MAX_RETRIES: ${DB_SYNC_MAX_RETRIES:-5}
      DB_SYNC_RETRY_DELAY: ${DB_SYNC_RETRY_DELAY:-5000}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_JWT_EXPIRES_IN: ${AUTH_JWT_EXPIRES_IN:-1d}
      API_BYPASS_AUTH: ${API_BYPASS_AUTH:-false}
      API_PUBLIC_URL: https://${API_DOMAIN}
      CORS_ORIGIN: https://${FRONT_DOMAIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASS: ${REDIS_PASS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: ${API_LIMIT_CPUS:-0.50}
          memory: ${API_LIMIT_MEMORY:-512M}
        reservations:
          cpus: ${API_RESERVE_CPUS:-0.25}
          memory: ${API_RESERVE_MEMORY:-128M}
    labels:
      - traefik.enable=true
      # Middlewares — définis une fois sur l'API, réutilisables par tous les services
      - traefik.http.middlewares.mmm-${ENVIRONMENT}-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.mmm-${ENVIRONMENT}-https-redirect.redirectscheme.permanent=true
      - traefik.http.middlewares.mmm-${ENVIRONMENT}-hsts.headers.stsSeconds=63072000
      - traefik.http.middlewares.mmm-${ENVIRONMENT}-hsts.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.mmm-${ENVIRONMENT}-hsts.headers.stsPreload=true
      # Router HTTPS
      - traefik.http.routers.mmm-${ENVIRONMENT}-api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.mmm-${ENVIRONMENT}-api.entrypoints=websecure
      - traefik.http.routers.mmm-${ENVIRONMENT}-api.tls.certresolver=letsencrypt
      - traefik.http.routers.mmm-${ENVIRONMENT}-api.middlewares=mmm-${ENVIRONMENT}-hsts
      # Router HTTP → redirect HTTPS
      - traefik.http.routers.mmm-${ENVIRONMENT}-api-http.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.mmm-${ENVIRONMENT}-api-http.entrypoints=web
      - traefik.http.routers.mmm-${ENVIRONMENT}-api-http.middlewares=mmm-${ENVIRONMENT}-https-redirect
      - traefik.http.services.mmm-${ENVIRONMENT}-api.loadbalancer.server.port=${API_PORT:-3000}
      - traefik.docker.network=traefik_proxy
    networks:
      - mmm_network
      - traefik_proxy
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  #  Sauvegarde automatique PostgreSQL — pg_dump quotidien vers volume Docker
  #  Logs : docker compose logs backup
  #  Dump manuel : docker compose exec backup /usr/local/bin/backup.sh
  # ═══════════════════════════════════════════════════════════════════════════

  backup:
    image: postgres:17-alpine
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        mkdir -p /backups

        do_backup() {
          TS=$$(date +"%Y%m%d_%H%M%S")
          FILE="/backups/mymemomaster_$${ENVIRONMENT}_$${TS}.dump"
          echo "[backup] $$(date '+%Y-%m-%d %H:%M:%S') — dump $${PG_DB}@$${PG_HOST}..."
          PGPASSWORD="$${PG_PASS}" pg_dump \
            -h "$${PG_HOST}" -p "$${PG_PORT}" \
            -U "$${PG_USER}" -Fc "$${PG_DB}" > "$${FILE}" \
            || { echo "[backup] ERREUR pg_dump — dump partiel supprimé"; rm -f "$${FILE}"; return 1; }
          echo "[backup] OK : $$(basename "$${FILE}") ($$(du -sh "$${FILE}" | cut -f1))"
          find /backups -name "mymemomaster_$${ENVIRONMENT}_*.dump" \
            -mtime "+$${BACKUP_RETENTION_DAYS}" -delete
          echo "[backup] Rétention $${BACKUP_RETENTION_DAYS}j appliquée"
        }

        echo "[backup] Service démarré — sauvegarde quotidienne à $${BACKUP_HOUR}h00 UTC"
        echo "[backup] Volume : /backups | Rétention : $${BACKUP_RETENTION_DAYS}j"
        echo "[backup] Sauvegarde initiale au démarrage..."
        do_backup || echo "[backup] AVERTISSEMENT : sauvegarde initiale échouée"

        while true; do
          NOW_H=$$(date -u +%H); NOW_M=$$(date -u +%M); NOW_S=$$(date -u +%S)
          NOW_SECS=$$(( 10#$${NOW_H} * 3600 + 10#$${NOW_M} * 60 + 10#$${NOW_S} ))
          TGT_SECS=$$(( 10#$${BACKUP_HOUR} * 3600 ))
          if [ "$${NOW_SECS}" -lt "$${TGT_SECS}" ]; then
            WAIT=$$(( TGT_SECS - NOW_SECS ))
          else
            WAIT=$$(( 86400 - NOW_SECS + TGT_SECS ))
          fi
          echo "[backup] Prochain dump dans $${WAIT}s (~$${BACKUP_HOUR}h00 UTC)"
          sleep "$${WAIT}"
          do_backup || echo "[backup] ERREUR : sauvegarde échouée — nouvelle tentative au prochain cycle"
        done
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      PG_HOST: postgres
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER}
      PG_PASS: ${PG_PASS}
      PG_DB: ${PG_DB}
      BACKUP_HOUR: ${BACKUP_HOUR:-3}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - backup-data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: ${BACKUP_LIMIT_CPUS:-0.10}
          memory: ${BACKUP_LIMIT_MEMORY:-128M}
        reservations:
          cpus: ${BACKUP_RESERVE_CPUS:-0.05}
          memory: ${BACKUP_RESERVE_MEMORY:-32M}
    networks:
      - mmm_network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  #  Frontend Vue 3 — image nginx tirée de DockerHub
  #  La commande injecte window.__APP_CONFIG__ au runtime pour permettre
  #  de déployer la même image sur plusieurs environnements sans rebuild.
  # ═══════════════════════════════════════════════════════════════════════════

  front:
    image: ${IMAGE_FRONT}
    command:
      - /bin/sh
      - -c
      - |
        set -e
        cat <<EOF >/usr/share/nginx/html/config.js
        window.__APP_CONFIG__ = {
          API_URL: "${VITE_API_URL}",
          FRONT_URL: "${VITE_FRONT_URL}"
        };
        EOF
        if ! grep -q '/config.js' /usr/share/nginx/html/index.html; then
          sed -i '/type="module"/i \  <script src="/config.js"></script>' /usr/share/nginx/html/index.html
        fi
        exec nginx -g 'daemon off;'
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: ${FRONT_LIMIT_CPUS:-0.25}
          memory: ${FRONT_LIMIT_MEMORY:-256M}
        reservations:
          cpus: ${FRONT_RESERVE_CPUS:-0.10}
          memory: ${FRONT_RESERVE_MEMORY:-64M}
    labels:
      - traefik.enable=true
      - traefik.http.routers.mmm-${ENVIRONMENT}-front.rule=Host(`${FRONT_DOMAIN}`)
      - traefik.http.routers.mmm-${ENVIRONMENT}-front.entrypoints=websecure
      - traefik.http.routers.mmm-${ENVIRONMENT}-front.tls.certresolver=letsencrypt
      - traefik.http.routers.mmm-${ENVIRONMENT}-front.middlewares=mmm-${ENVIRONMENT}-hsts
      - traefik.http.routers.mmm-${ENVIRONMENT}-front-http.rule=Host(`${FRONT_DOMAIN}`)
      - traefik.http.routers.mmm-${ENVIRONMENT}-front-http.entrypoints=web
      - traefik.http.routers.mmm-${ENVIRONMENT}-front-http.middlewares=mmm-${ENVIRONMENT}-https-redirect
      - traefik.http.services.mmm-${ENVIRONMENT}-front.loadbalancer.server.port=80
      - traefik.docker.network=traefik_proxy
    networks:
      - mmm_network
      - traefik_proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

# =============================================================================
#  RÉSEAUX
# =============================================================================

networks:
  mmm_network:
    name: my_memo_master_${ENVIRONMENT}_network
    driver: bridge
  # Réseau externe géré par Traefik sur le VPS (doit exister avant le déploiement)
  traefik_proxy:
    external: true

# =============================================================================
#  VOLUMES
# =============================================================================

volumes:
  postgres-data:
  pgadmin-data:
  api-data:
  redis-data:
  backup-data:

# =============================================================================
#  MyMemoMaster — docker-compose.yml (unified)
#
#  Usage:
#    Dev local : docker compose --env-file .env.dev  up --build
#    Test VPS  : docker compose --env-file .env.test up
#    Prod  VPS : docker compose --env-file .env.prod up
#
#  Profiles (défini via COMPOSE_PROFILES dans le .env.*) :
#    dev  — Traefik local HTTP, build depuis les sources, hot-reload API
#    test — Images DockerHub, Traefik externe HTTPS, domaines de test
#    prod — Images DockerHub, Traefik externe HTTPS, domaines de prod
#
#  Kubernetes (preprod/prod) : voir k8s/ — docker-compose non utilisé
# =============================================================================

services:

  # ═══════════════════════════════════════════════════════════════════════════
  #  BASE — démarré dans tous les environnements (aucun profil)
  # ═══════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_DB: ${PG_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: ${POSTGRES_LIMIT_CPUS:-0.50}
          memory: ${POSTGRES_LIMIT_MEMORY:-1024M}
        reservations:
          cpus: ${POSTGRES_RESERVE_CPUS:-0.25}
          memory: ${POSTGRES_RESERVE_MEMORY:-256M}
    networks:
      - mmm_network

  redis:
    image: redis:7-alpine
    command: >
      sh -c "if [ -n '${REDIS_PASS}' ]; then redis-server --requirepass ${REDIS_PASS}; else redis-server; fi"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: ${REDIS_LIMIT_CPUS:-0.25}
          memory: ${REDIS_LIMIT_MEMORY:-128M}
        reservations:
          cpus: ${REDIS_RESERVE_CPUS:-0.10}
          memory: ${REDIS_RESERVE_MEMORY:-32M}
    networks:
      - mmm_network

  # ═══════════════════════════════════════════════════════════════════════════
  #  DEV — machine locale, HTTP, images buildées localement
  #  Commande : docker compose --env-file .env.dev up --build
  #  Note : le front ne supporte pas le hot-reload (image nginx).
  #         Pour modifier le front, relancer : docker compose ... build front && up -d front
  # ═══════════════════════════════════════════════════════════════════════════

  traefik:
    profiles: ["dev"]
    image: traefik:v2.10
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    deploy:
      resources:
        limits:
          cpus: ${TRAEFIK_LIMIT_CPUS:-0.25}
          memory: ${TRAEFIK_LIMIT_MEMORY:-256M}
        reservations:
          cpus: ${TRAEFIK_RESERVE_CPUS:-0.10}
          memory: ${TRAEFIK_RESERVE_MEMORY:-64M}
    networks:
      - mmm_network

  pgadmin:
    profiles: ["dev"]
    image: dpage/pgadmin4:8
    ports:
      - "${PGADMIN_PORT:-5051}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: ${PGADMIN_LIMIT_CPUS:-0.25}
          memory: ${PGADMIN_LIMIT_MEMORY:-256M}
        reservations:
          cpus: ${PGADMIN_RESERVE_CPUS:-0.10}
          memory: ${PGADMIN_RESERVE_MEMORY:-64M}
    networks:
      - mmm_network

  api:
    profiles: ["dev"]
    image: ${IMAGE_API}
    build:
      context: ./my_memo_master_api
      dockerfile: Dockerfile
    volumes:
      - ./my_memo_master_api:/app
      - api-node-modules:/app/node_modules
    environment:
      NODE_ENV: development
      API_PORT: ${API_PORT:-3000}
      PG_HOST: postgres
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER}
      PG_PASS: ${PG_PASS}
      PG_DB: ${PG_DB}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_JWT_EXPIRES_IN: ${AUTH_JWT_EXPIRES_IN:-1d}
      API_BYPASS_AUTH: ${API_BYPASS_AUTH:-false}
      API_PUBLIC_URL: http://${API_DOMAIN}
      CORS_ORIGIN: ${VITE_FRONT_URL}
      EMAIL_FROM: ${EMAIL_FROM}
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASS: ${REDIS_PASS:-}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD}
      RATE_LIMIT_DISABLED: ${RATE_LIMIT_DISABLED:-false}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: ${API_LIMIT_CPUS:-0.50}
          memory: ${API_LIMIT_MEMORY:-512M}
        reservations:
          cpus: ${API_RESERVE_CPUS:-0.25}
          memory: ${API_RESERVE_MEMORY:-128M}
    labels:
      - traefik.enable=true
      - traefik.http.routers.mmm-api.rule=Host(`${API_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.mmm-api.entrypoints=web
      - traefik.http.services.mmm-api.loadbalancer.server.port=${API_PORT:-3000}
    networks:
      - mmm_network
    restart: on-failure
    # Sonde HTTP sur /api/v1/health (vérifie aussi la connexion DB) — node:22 a fetch natif
    # start_period long : l'entrypoint joue npm install + migrations avant d'écouter
    healthcheck:
      test: ["CMD", "node", "-e", "fetch(`http://127.0.0.1:$${process.env.API_PORT||3000}/api/v1/health`).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  front:
    profiles: ["dev"]
    image: ${IMAGE_FRONT}
    build:
      context: ./my_memo_master_front
      dockerfile: Dockerfile
      args:
        VITE_APP_NAME: ${VITE_APP_NAME}
        VITE_APP_COMPANY_NAME: ${VITE_APP_COMPANY_NAME}
        VITE_APP_AUTHOR_NAME: ${VITE_APP_AUTHOR_NAME}
        VITE_APP_DESCRIPTION: ${VITE_APP_DESCRIPTION}
        VITE_APP_THEME_COLOR: ${VITE_APP_THEME_COLOR}
        VITE_APP_BG_COLOR: ${VITE_APP_BG_COLOR}
        VITE_FRONT_URL: ${VITE_FRONT_URL}
        VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: ${FRONT_LIMIT_CPUS:-0.25}
          memory: ${FRONT_LIMIT_MEMORY:-256M}
        reservations:
          cpus: ${FRONT_RESERVE_CPUS:-0.10}
          memory: ${FRONT_RESERVE_MEMORY:-64M}
    labels:
      - traefik.enable=true
      - traefik.http.routers.mmm-front.rule=Host(`${FRONT_DOMAIN}`)
      - traefik.http.routers.mmm-front.entrypoints=web
      - traefik.http.services.mmm-front.loadbalancer.server.port=80
    networks:
      - mmm_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  #  TEST / PROD VPS — images DockerHub, Traefik externe, HTTPS Let's Encrypt
  #  Commande : docker compose --env-file .env.test up
  #  Prérequis VPS : réseau Docker "traefik_proxy" existant (Traefik déjà lancé)
  # ═══════════════════════════════════════════════════════════════════════════

  pgadmin_server:
    profiles: ["test", "prod"]
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: ${PGADMIN_LIMIT_CPUS:-0.25}
          memory: ${PGADMIN_LIMIT_MEMORY:-256M}
        reservations:
          cpus: ${PGADMIN_RESERVE_CPUS:-0.10}
          memory: ${PGADMIN_RESERVE_MEMORY:-64M}
    labels:
      - traefik.enable=true
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin.rule=Host(`${PGADMIN_DOMAIN}`)
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin.entrypoints=websecure
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin.tls.certresolver=letsencrypt
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin.middlewares=mmm-${ENVIRONMENT}-hsts
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin-http.rule=Host(`${PGADMIN_DOMAIN}`)
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin-http.entrypoints=web
      - traefik.http.routers.mmm-${ENVIRONMENT}-pgadmin-http.middlewares=mmm-${ENVIRONMENT}-https-redirect
      - traefik.http.services.mmm-${ENVIRONMENT}-pgadmin.loadbalancer.server.port=80
      - traefik.docker.network=traefik_proxy
    networks:
      - mmm_network
      - traefik_proxy

  api_server:
    profiles: ["test", "prod"]
    image: ${IMAGE_API}
    volumes:
      - api-data:/app/data
    environment:
      NODE_ENV: production
      ENVIRONMENT: ${ENVIRONMENT}
      API_PORT: ${API_PORT:-3000}
      PG_HOST: postgres
      PG_PORT: ${PG_PORT:-5432}
      PG_USER: ${PG_USER}
      PG_PASS: ${PG_PASS}
      PG_DB: ${PG_DB}
      DB_SYNC_MAX_RETRIES: ${DB_SYNC_MAX_RETRIES:-5}
      DB_SYNC_RETRY_DELAY: ${DB_SYNC_RETRY_DELAY:-5000}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      AUTH_JWT_EXPIRES_IN: ${AUTH_JWT_EXPIRES_IN:-1d}
      API_BYPASS_AUTH: ${API_BYPASS_AUTH:-false}
      API_PUBLIC_URL: https://${API_DOMAIN}
      CORS_ORIGIN: https://${FRONT_DOMAIN}
      EMAIL_FROM: ${EMAIL_FROM}
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASS: ${REDIS_PASS:-}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: ${API_LIMIT_CPUS:-0.50}
          memory: ${API_LIMIT_MEMORY:-512M}
        reservations:
          cpus: ${API_RESERVE_CPUS:-0.25}
          memory: ${API_RESERVE_MEMORY:-128M}
    labels:
      - traefik.enable=true
      # Middlewares — définis une fois sur l'API, réutilisables par tous les services
      - traefik.http.middlewares.mmm-${ENVIRONMENT}-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.mmm-${ENVIRONMENT}-https-redirect.redirectscheme.permanent=true
      - traefik.http.middlewares.mmm-${ENVIRONMENT}-hsts.headers.stsSeconds=63072000
      - traefik.http.middlewares.mmm-${ENVIRONMENT}-hsts.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.mmm-${ENVIRONMENT}-hsts.headers.stsPreload=true
      # Router HTTPS
      - traefik.http.routers.mmm-${ENVIRONMENT}-api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.mmm-${ENVIRONMENT}-api.entrypoints=websecure
      - traefik.http.routers.mmm-${ENVIRONMENT}-api.tls.certresolver=letsencrypt
      - traefik.http.routers.mmm-${ENVIRONMENT}-api.middlewares=mmm-${ENVIRONMENT}-hsts
      # Router HTTP → redirect HTTPS
      - traefik.http.routers.mmm-${ENVIRONMENT}-api-http.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.mmm-${ENVIRONMENT}-api-http.entrypoints=web
      - traefik.http.routers.mmm-${ENVIRONMENT}-api-http.middlewares=mmm-${ENVIRONMENT}-https-redirect
      - traefik.http.services.mmm-${ENVIRONMENT}-api.loadbalancer.server.port=${API_PORT:-3000}
      - traefik.docker.network=traefik_proxy
    networks:
      - mmm_network
      - traefik_proxy
    restart: unless-stopped
    # Sonde HTTP sur /api/v1/health (vérifie aussi la connexion DB) — node:22 a fetch natif
    healthcheck:
      test: ["CMD", "node", "-e", "fetch(`http://127.0.0.1:$${process.env.API_PORT||3000}/api/v1/health`).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  front_server:
    profiles: ["test", "prod"]
    image: ${IMAGE_FRONT}
    # Injection runtime de la config : permet de déployer la même image sur
    # plusieurs environnements sans rebuild. L'app lit window.__APP_CONFIG__.
    command:
      - /bin/sh
      - -c
      - |
        set -e
        cat <<EOF >/usr/share/nginx/html/config.js
        window.__APP_CONFIG__ = {
          API_URL: "${VITE_API_URL}",
          FRONT_URL: "${VITE_FRONT_URL}"
        };
        EOF
        if ! grep -q '/config.js' /usr/share/nginx/html/index.html; then
          sed -i '/type="module"/i \  <script src="/config.js"></script>' /usr/share/nginx/html/index.html
        fi
        exec nginx -g 'daemon off;'
    depends_on:
      - api_server
    deploy:
      resources:
        limits:
          cpus: ${FRONT_LIMIT_CPUS:-0.25}
          memory: ${FRONT_LIMIT_MEMORY:-256M}
        reservations:
          cpus: ${FRONT_RESERVE_CPUS:-0.10}
          memory: ${FRONT_RESERVE_MEMORY:-64M}
    labels:
      - traefik.enable=true
      - traefik.http.routers.mmm-${ENVIRONMENT}-front.rule=Host(`${FRONT_DOMAIN}`)
      - traefik.http.routers.mmm-${ENVIRONMENT}-front.entrypoints=websecure
      - traefik.http.routers.mmm-${ENVIRONMENT}-front.tls.certresolver=letsencrypt
      - traefik.http.routers.mmm-${ENVIRONMENT}-front.middlewares=mmm-${ENVIRONMENT}-hsts
      - traefik.http.routers.mmm-${ENVIRONMENT}-front-http.rule=Host(`${FRONT_DOMAIN}`)
      - traefik.http.routers.mmm-${ENVIRONMENT}-front-http.entrypoints=web
      - traefik.http.routers.mmm-${ENVIRONMENT}-front-http.middlewares=mmm-${ENVIRONMENT}-https-redirect
      - traefik.http.services.mmm-${ENVIRONMENT}-front.loadbalancer.server.port=80
      - traefik.docker.network=traefik_proxy
    networks:
      - mmm_network
      - traefik_proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

# =============================================================================
#  RÉSEAUX
# =============================================================================

networks:
  mmm_network:
    name: my_memo_master_${ENVIRONMENT}_network
    driver: bridge
  # Réseau externe géré par Traefik sur le VPS (test/prod uniquement)
  # En dev, ce réseau n'est pas utilisé → pas besoin qu'il existe localement
  traefik_proxy:
    external: true

# =============================================================================
#  VOLUMES
# =============================================================================

volumes:
  postgres-data:
  pgadmin-data:
  api-node-modules:
  api-data:
  redis-data:

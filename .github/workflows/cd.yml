name: CD

# Déclenché quand le CI se termine sur les branches de déploiement
on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
      - staging
      - dev

permissions:
  contents: read

# =============================================================================
#  Secrets GitHub requis :
#
#  Communs :
#    DOCKERHUB_USERNAME      — nom d'utilisateur Docker Hub
#    DOCKERHUB_PASSWORD      — mot de passe / token Docker Hub
#    DISCORD_LOG             — webhook Discord pour les notifications
#
#  Branche dev → environnement "test" (VPS) :
#    SSH_TEST_PRIVATE_KEY    — clé SSH privée pour le VPS test
#    SSH_TEST_USERNAME       — utilisateur SSH du VPS test
#    VPS_PORT                — port SSH du VPS
#    VPS_IP                  — adresse IP du VPS
#
#  Branche staging → environnement "preprod" (Kubernetes) :
#    KUBECONFIG_PREPROD      — kubeconfig base64 pour le cluster K8s preprod
#
#  Branche main (Kubernetes prod — activé via variable K8S_PROD_ENABLED=true) :
#    KUBECONFIG_PROD         — kubeconfig base64 pour le cluster K8s prod
# =============================================================================

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  #  1. BUILD & PUSH IMAGES DOCKER HUB
  #     - test    : mymemomaster_test_api/front:latest
  #     - preprod : mymemomaster_preprod_api/front:latest
  #     - main    : mymemomaster_api/front:latest
  # ═══════════════════════════════════════════════════════════════════════════

  push_images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    outputs:
      branch: ${{ steps.vars.outputs.branch }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Export branch name
        id: vars
        run: echo "branch=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push — test images
        if: github.event.workflow_run.head_branch == 'dev'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_test_api:latest \
            -f my_memo_master_api/Dockerfile my_memo_master_api/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_test_api:latest

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_test_front:latest \
            -f my_memo_master_front/Dockerfile my_memo_master_front/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_test_front:latest

      - name: Build and Push — preprod images
        if: github.event.workflow_run.head_branch == 'staging'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_preprod_api:latest \
            -f my_memo_master_api/Dockerfile my_memo_master_api/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_preprod_api:latest

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_preprod_front:latest \
            -f my_memo_master_front/Dockerfile my_memo_master_front/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_preprod_front:latest

      - name: Build and Push — prod images
        if: github.event.workflow_run.head_branch == 'main'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_api:latest \
            -f my_memo_master_api/Dockerfile my_memo_master_api/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_api:latest

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_front:latest \
            -f my_memo_master_front/Dockerfile my_memo_master_front/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_front:latest

  # ═══════════════════════════════════════════════════════════════════════════
  #  2a. DEPLOY TEST → VPS (docker compose)
  # ═══════════════════════════════════════════════════════════════════════════

  deploy_test:
    name: Deploy to VPS (test)
    runs-on: ubuntu-latest
    needs: push_images
    if: needs.push_images.outputs.branch == 'dev'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate docker-compose syntax
        run: |
          cp server_docker_compose/.env.example server_docker_compose/.env
          docker compose -f server_docker_compose/docker-compose.yml \
            --env-file server_docker_compose/.env config -q

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_TEST_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Stop test environment
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.SSH_TEST_USERNAME }}@${{ secrets.VPS_IP }} << 'EOF'
            set -e
            mkdir -p /var/www/html/my_memo_master_test
            cd /var/www/html/my_memo_master_test
            if [ -f .env ]; then
              env -i HOME="$HOME" PATH="$PATH" docker compose --env-file .env down || true
            else
              echo "No .env found — skipping docker compose down."
            fi
          EOF

      - name: Upload docker-compose
        run: |
          scp -P ${{ secrets.VPS_PORT }} \
            server_docker_compose/docker-compose.yml \
            ${{ secrets.SSH_TEST_USERNAME }}@${{ secrets.VPS_IP }}:/var/www/html/my_memo_master_test/docker-compose.yml

      - name: Validate test server env
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.SSH_TEST_USERNAME }}@${{ secrets.VPS_IP }} << 'EOF'
            set -e
            cd /var/www/html/my_memo_master_test
            if [ ! -f .env ]; then
              echo "Missing .env on the VPS at /var/www/html/my_memo_master_test/.env"
              exit 1
            fi
            if ! grep -q '^ENVIRONMENT=test$' .env; then
              echo "Expected ENVIRONMENT=test in .env — found:"
              grep '^ENVIRONMENT=' .env || true
              exit 1
            fi
            env -i HOME="$HOME" PATH="$PATH" docker compose --env-file .env config -q
          EOF

      - name: Deploy to VPS
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.SSH_TEST_USERNAME }}@${{ secrets.VPS_IP }} << 'EOF'
            set -e
            cd /var/www/html/my_memo_master_test
            compose() {
              env -i HOME="$HOME" PATH="$PATH" docker compose --env-file .env "$@"
            }

            compose pull
            compose up -d postgres redis
            compose up -d pgadmin api front backup
            compose ps

            attempt=1
            max_attempts=24
            services="postgres api front"
            all_ready=0

            while [ "$attempt" -le "$max_attempts" ]; do
              all_ready=1
              echo "Vérification $attempt/$max_attempts"
              for service in $services; do
                container_id=$(compose ps -q "$service")
                if [ -z "$container_id" ]; then
                  echo "Service $service : pas encore démarré"
                  all_ready=0
                  continue
                fi
                status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")
                echo "$service => $status"
                if [ "$status" != "healthy" ] && [ "$status" != "running" ]; then
                  all_ready=0
                fi
              done
              if [ "$all_ready" -eq 1 ]; then
                echo "Tous les services sont démarrés."
                break
              fi
              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep 5
              fi
              attempt=$((attempt + 1))
            done

            if [ "$all_ready" -ne 1 ]; then
              echo "Échec de la vérification du déploiement."
              compose ps
              compose logs --tail=100
              exit 1
            fi
          EOF

  # ═══════════════════════════════════════════════════════════════════════════
  #  2b. DEPLOY PREPROD → Kubernetes via Helm
  #      Release : mmm-preprod  /  Namespace : mymemomaster-preprod
  #
  #  Première fois : exécuter k8s/helm-migrate.sh preprod pour adopter les
  #  ressources kubectl existantes avant de laisser Helm les gérer.
  # ═══════════════════════════════════════════════════════════════════════════

  deploy_preprod:
    name: Deploy to Kubernetes (preprod)
    runs-on: ubuntu-latest
    needs: push_images
    if: needs.push_images.outputs.branch == 'staging'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PREPROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Deploy with Helm
        run: |
          helm upgrade --install mmm-preprod ./helm \
            -f helm/values-preprod.yaml \
            -n mymemomaster-preprod \
            --create-namespace \
            --set "rolloutTimestamp=$(date +%s)" \
            --atomic \
            --timeout 5m

      - name: "[TEST] Debug node taints/conditions (temporaire)"
        if: always()
        run: |
          {
            echo "=== NODES ==="
            kubectl get nodes -o wide
            echo ""
            for n in $(kubectl get nodes -o jsonpath='{.items[*].metadata.name}'); do
              echo "=== NODE: $n (Taints/Conditions) ==="
              kubectl describe node "$n" | sed -n '/^Taints:/,/^Addresses:/p'
              echo ""
            done
            echo "=== PODS (resume par statut) ==="
            kubectl get pods -n mymemomaster-preprod --no-headers | awk '{print $3}' | sort | uniq -c
          } > /tmp/debug.txt
          cat /tmp/debug.txt
          PAYLOAD=$(jq -Rs '{content: ("```\n" + .[0:1900] + "\n```")}' /tmp/debug.txt)
          curl -s -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "${{ secrets.DISCORD_LOG }}"

  # ═══════════════════════════════════════════════════════════════════════════
  #  2c. DEPLOY PROD → Kubernetes via Helm
  #      Release : mmm-prod  /  Namespace : mymemomaster
  #      Désactivé jusqu'à K8S_PROD_ENABLED=true dans Settings → Variables.
  #
  #  Première fois : exécuter k8s/helm-migrate.sh prod pour adopter les
  #  ressources kubectl existantes avant de laisser Helm les gérer.
  # ═══════════════════════════════════════════════════════════════════════════

  deploy_prod:
    name: Deploy to Kubernetes (prod)
    runs-on: ubuntu-latest
    needs: push_images
    if: needs.push_images.outputs.branch == 'main' && vars.K8S_PROD_ENABLED == 'true'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_PROD }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Verify cluster connection
        run: kubectl cluster-info

      - name: Deploy with Helm
        run: |
          helm upgrade --install mmm-prod ./helm \
            -f helm/values-prod.yaml \
            -n mymemomaster \
            --create-namespace \
            --set "rolloutTimestamp=$(date +%s)" \
            --atomic \
            --timeout 8m

  # ═══════════════════════════════════════════════════════════════════════════
  #  3. NOTIFICATIONS DISCORD
  # ═══════════════════════════════════════════════════════════════════════════

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: [push_images, deploy_test, deploy_preprod, deploy_prod]
    if: always() && needs.push_images.result == 'success'
    steps:
      - name: Send notification
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            STATUS="échoué"
            EMOJI="❌"
          else
            STATUS="réussi"
            EMOJI="✅"
          fi
          curl -s -X POST -H "Content-Type: application/json" \
            -d "{\"content\": \"${EMOJI} Déploiement **${BRANCH}** ${STATUS}.\"}" \
            "${{ secrets.DISCORD_LOG }}"

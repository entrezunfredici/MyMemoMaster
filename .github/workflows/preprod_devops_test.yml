name: Preprod Branch Deploy

on:
  push:
    branches:
      - 'dev*'
      - 'dev*/**'
      - '!dev'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preprod-branch-deploy
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            path: my_memo_master_api
          - service: front
            path: my_memo_master_front
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run Tests
        working-directory: ${{ matrix.path }}
        run: npm run test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            path: my_memo_master_api
          - service: front
            path: my_memo_master_front
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run Lint
        working-directory: ${{ matrix.path }}
        run: npm run lint

  push_on_docker_hub:
    name: Build and Push PreProd Images
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Docker Images
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_test_api:latest -f my_memo_master_api/Dockerfile my_memo_master_api/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_test_api:latest
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_test_front:latest -f my_memo_master_front/Dockerfile my_memo_master_front/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mymemomaster_test_front:latest

  deploy_preprod:
    name: Deploy PreProd
    runs-on: ubuntu-latest
    needs: push_on_docker_hub
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare server docker-compose env for validation
        run: cp server_docker_compose/.env.example server_docker_compose/.env

      - name: Validate server docker-compose
        run: docker compose -f server_docker_compose/docker-compose.yml --env-file server_docker_compose/.env config -q

      - name: Set up SSH PREPROD
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PREPROD_PRIVATE_KEY }}

      - name: Prepare known_hosts
        run: |
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Stop PREPROD
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.SSH_PREPROD_USERNAME }}@${{ secrets.VPS_IP }} << 'EOF'
            set -e
            mkdir -p /var/www/html/my_memo_master_preprod
            cd /var/www/html/my_memo_master_preprod
            if [ -f .env ]; then
              env -i HOME="$HOME" PATH="$PATH" docker compose --env-file .env down || true
            else
              echo "No .env found in $(pwd); skipping docker compose down."
            fi
          EOF

      - name: Upload docker-compose in PREPROD
        run: |
          scp -v -P ${{ secrets.VPS_PORT }} \
            server_docker_compose/docker-compose.yml \
            ${{ secrets.SSH_PREPROD_USERNAME }}@${{ secrets.VPS_IP }}:/var/www/html/my_memo_master_preprod/docker-compose.yml

      - name: Validate PREPROD server env
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.SSH_PREPROD_USERNAME }}@${{ secrets.VPS_IP }} << 'EOF'
            set -e
            cd /var/www/html/my_memo_master_preprod

            if [ ! -f .env ]; then
              echo "Missing /var/www/html/my_memo_master_preprod/.env on the VPS."
              exit 1
            fi

            if ! grep -q '^ENVIRONMENT=preprod$' .env; then
              echo "Expected ENVIRONMENT=preprod in /var/www/html/my_memo_master_preprod/.env."
              echo "Current value:"
              grep '^ENVIRONMENT=' .env || true
              exit 1
            fi

            env -i HOME="$HOME" PATH="$PATH" docker compose --env-file .env config -q
          EOF

      - name: Deploy to VPS in PREPROD
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.SSH_PREPROD_USERNAME }}@${{ secrets.VPS_IP }} << 'EOF'
            set -e
            cd /var/www/html/my_memo_master_preprod
            compose() {
              env -i HOME="$HOME" PATH="$PATH" docker compose --env-file .env "$@"
            }

            compose pull
            compose up -d postgres
            # compose run --rm db-sync
            compose up -d pgadmin api front
            compose ps

            attempt=1
            max_attempts=24
            services="postgres api front pgadmin"
            all_ready=0

            while [ "$attempt" -le "$max_attempts" ]; do
              all_ready=1
              echo "Verification attempt $attempt/$max_attempts"

              for service in $services; do
                container_id=$(compose ps -q "$service")

                if [ -z "$container_id" ]; then
                  echo "Service $service has no container yet"
                  all_ready=0
                  continue
                fi

                status=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id")
                echo "$service => $status"

                if [ "$status" != "healthy" ] && [ "$status" != "running" ]; then
                  all_ready=0
                fi
              done

              if [ "$all_ready" -eq 1 ]; then
                echo "All services are up."
                break
              fi

              if [ "$attempt" -lt "$max_attempts" ]; then
                sleep 5
              fi

              attempt=$((attempt + 1))
            done

            if [ "$all_ready" -ne 1 ]; then
              echo "Deployment verification failed."
              compose ps
              compose logs --tail=100
              exit 1
            fi
          EOF

  build_failure:
    runs-on: ubuntu-latest
    needs: deploy_preprod
    if: failure()
    steps:
      - name: Notify Deployment Failure
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"Deployment failed on branch ${{ github.ref_name }}!\"}" \
          ${{ secrets.DISCORD_LOG }}

  build_success:
    runs-on: ubuntu-latest
    needs: deploy_preprod
    if: success()
    steps:
      - name: Notify Deployment Success
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"Deployment succeeded on branch ${{ github.ref_name }}!\"}" \
          ${{ secrets.DISCORD_LOG }}

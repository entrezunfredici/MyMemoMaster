name: CI


on:
  push:
    branches:
      - main
      - staging
      - dev
      - '*devops*'
      - 'dev_back_*'
      - 'dev_front_*'

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          BRANCH="${GITHUB_REF##*/}"
          if [[ "$BRANCH" == dev_front_* ]]; then
            echo 'matrix={"include":[{"service":"front","path":"my_memo_master_front"}]}' >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == dev_back_* ]]; then
            echo 'matrix={"include":[{"service":"api","path":"my_memo_master_api"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"service":"api","path":"my_memo_master_api"},{"service":"front","path":"my_memo_master_front"}]}' >> $GITHUB_OUTPUT
          fi

  test_and_lint:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run Tests
        working-directory: ${{ matrix.path }}
        run: npm run test

      - name: Run Lint
        working-directory: ${{ matrix.path }}
        run: npm run lint

      # OWASP A06 — composants vulnérables : bloque si une dépendance de production
      # a une vulnérabilité high/critical connue (les devDependencies sont exclues,
      # elles n'entrent pas dans les images déployées)
      - name: Audit Dependencies (OWASP A06)
        working-directory: ${{ matrix.path }}
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        if: matrix.service == 'front'
        working-directory: ${{ matrix.path }}
        run: npm run build

  # Analyse statique continue sur SonarCloud (SonarQube Cloud) — remplace
  # l'instance SonarQube auto-hébergée. Un seul projet (monorepo).
  # Limité à main : l'analyse multi-branches est une fonctionnalité payante
  # de SonarCloud — le plan gratuit n'accepte que la branche principale.
  # Config du scanner : sonar-project.properties à la racine.
  # Prérequis : secret SONAR_TOKEN (token généré sur sonarcloud.io) et
  # Automatic Analysis désactivée sur le projet SonarCloud.
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test_and_lint
    if: success() && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Historique complet requis par Sonar pour attribuer le "new code"
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

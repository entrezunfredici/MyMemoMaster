name: CI


on:
  push:
    branches:
      - main
      - staging
      - dev
      - '*devops*'
      - 'dev_back_*'
      - 'dev_front_*'

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          BRANCH="${GITHUB_REF##*/}"
          if [[ "$BRANCH" == dev_front_* ]]; then
            echo 'matrix={"include":[{"service":"front","path":"my_memo_master_front"}]}' >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == dev_back_* ]]; then
            echo 'matrix={"include":[{"service":"api","path":"my_memo_master_api"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"service":"api","path":"my_memo_master_api"},{"service":"front","path":"my_memo_master_front"}]}' >> $GITHUB_OUTPUT
          fi

  test_and_lint:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run Tests
        working-directory: ${{ matrix.path }}
        run: npm run test

      - name: Run Lint
        working-directory: ${{ matrix.path }}
        run: npm run lint

      - name: Build
        if: matrix.service == 'front'
        working-directory: ${{ matrix.path }}
        run: npm run build


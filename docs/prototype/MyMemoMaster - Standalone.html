document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

size:0.82rem;color:#374151;\">{{ n }}<\/div>\n              <\/sc-for>\n            <\/div>\n          <\/sc-if>\n        <\/div>\n      <\/header>\n    <\/sc-if>\n\n    <sc-if value=\"{{ isMobile }}\">\n      <header style=\"margin:16px;display:flex;align-items:flex-start;justify-content:space-between;\">\n        <h1 style=\"font-family:'neue-haas-bold-proto',sans-serif;color:#1E3BA1;font-size:1.9rem;font-weight:700;margin:0;\">{{ pageTitle }}<\/h1>\n        <button onclick=\"{{ toggleBell }}\" style=\"background:#F7F7F7;border:2px solid #D5DAED;border-radius:10px;width:40px;height:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1E3BA1;\">{{ iconBell }}<\/button>\n      <\/header>\n    <\/sc-if>\n\n    <main style=\"{{ mainStyle }}\">\n\n      <!-- ===================== HOME ===================== -->\n      <sc-if value=\"{{ isHome }}\">\n        <div style=\"max-width:960px;margin:0 auto 24px;\">\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;\">\n            <sc-for list=\"{{ homeMenuItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ item.action }}\" style=\"width:100%;background:#1E3BA1;color:#F7F7F7;border:none;padding:18px;border-radius:12px;font-size:1.1rem;font-weight:600;cursor:pointer;transition:filter 0.2s;\" onmouseenter=\"{{ (e)=&gt;e.currentTarget.style.filter='brightness(1.15)' }}\" onmouseleave=\"{{ (e)=&gt;e.currentTarget.style.filter='none' }}\">{{ item.label }}<\/button>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n        <div style=\"max-width:960px;margin:0 auto 24px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px 18px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">\n            <span style=\"font-size:14px;font-weight:700;color:#0f172a;\">Alertes &amp; Suggestions<\/span>\n            <a onclick=\"{{ navKpi }}\" ;padding:32px;width:100%;max-width:28rem;position:relative;\">\n              <button onclick=\"{{ closePlanModal }}\" style=\"position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.5rem;color:#9CA3AF;cursor:pointer;\">×<\/button>\n              <h2 style=\"font-size:1.5rem;font-weight:700;margin:0 0 4px;color:#101F56;\">Planifier une session<\/h2>\n              <p style=\"font-size:0.875rem;color:#6B7280;margin:0 0 24px;\">Système : <span style=\"font-weight:600;color:#1E3BA1;\">{{ planningSystemName }}<\/span><\/p>\n              <form onsubmit=\"{{ submitPlanForm }}\">\n                <div style=\"margin-bottom:16px;\">\n                  <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Nom de la session<\/label>\n                  <input type=\"text\" value=\"{{ planForm.name }}\" onchange=\"{{ setPlanName }}\" required=\"\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:1rem;\">\n                <\/div>\n                <div style=\"margin-bottom:16px;\">\n                  <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Date<\/label>\n                  <input type=\"date\" value=\"{{ planForm.date }}\" onchange=\"{{ setPlanDate }}\" required=\"\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:1rem;\">\n                <\/div>\n                <div style=\"display:flex;gap:1rem;margin-bottom:24px;\">\n                  <div style=\"flex:1;\">\n                    <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Heure de début<\/label>\n                    <input type=\"time\" value=\"{{ planForm.startTime }}\" onchange=\"{{ setPlanStart }}\" required=\"\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:1rem;\" border:1px solid #e5e7eb;border-radius:8px;\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">\n              <h3 style=\"font-size:0.85rem;font-weight:700;text-transform:uppercase;color:#9ca3af;margin:0;\">Boîtes du système<\/h3>\n              <button onclick=\"{{ openAddBoxModal }}\" style=\"background:none;border:none;color:#1E3BA1;font-size:0.85rem;font-weight:600;cursor:pointer;\">+ Ajouter une boîte<\/button>\n            <\/div>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n              <sc-for list=\"{{ systemBoxesView }}\" as=\"box\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;gap:8px;background:rgba(30,59,161,0.05);border:1px solid rgba(30,59,161,0.2);border-radius:8px;padding:8px 12px;font-size:0.85rem;\">\n                  <span style=\"font-weight:600;color:#1E3BA1;\">B{{ box.level }}<\/span>\n                  <span style=\"color:#6b7280;\">{{ box.intervall }}s<\/span>\n                  <button onclick=\"{{ box.onEdit }}\" style=\"background:none;border:none;color:#9ca3af;cursor:pointer;\">✎<\/button>\n                  <button onclick=\"{{ box.onDelete }}\" style=\"background:none;border:none;color:#9ca3af;cursor:pointer;\">✕<\/button>\n                <\/div>\n              <\/sc-for>\n            <\/div>\n          <\/div>\n\n          <sc-if value=\"{{ fcNoCards }}\"><p style=\"text-align:center;color:#9ca3af;padding:40px 0;\">Aucune carte dans ce système. Ajoutez-en une !<\/p><\/sc-if>\n\n          <sc-for list=\"{{ fcCardLevels }}\" as=\"grp\" hint-placeholder-count=\"2\">\n            <div style=\"margin-bottom:24px;\">\n              <h3 style=\"font-size:0.85rem;font-weight:700;text-transform:uppercase;color:#9ca3af;margin:0 0 8px;\">Boîte {{ grp.level }}<\/h3>\n              <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                <sc-for list=\"{{ grp.cards }}\" as=\"card\" hint-placehold  <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Type de question<\/label>\n                    <div style=\"display:flex;gap:12px;\">\n                      <button type=\"button\" onclick=\"{{ selectCardTypeOpen }}\" style=\"{{ cardTypeOpenStyle }}\">Ouverte<\/button>\n                      <button type=\"button\" onclick=\"{{ selectCardTypeMcq }}\" style=\"{{ cardTypeMcqStyle }}\">QCM<\/button>\n                    <\/div>\n                  <\/div>\n                <\/sc-if>\n                <div style=\"margin-bottom:16px;\">\n                  <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Question<\/label>\n                  <textarea value=\"{{ cardForm.statement }}\" onchange=\"{{ setCardStatement }}\" required=\"\" rows=\"3\" placeholder=\"Quelle est la loi d'Ohm ?\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:1rem;resize:vertical;\"><\/textarea>\n                <\/div>\n                <sc-if value=\"{{ cardTypeIsOpen }}\">\n                  <div style=\"margin-bottom:24px;\">\n                    <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Réponse correcte<\/label>\n                    <textarea value=\"{{ cardForm.answer }}\" onchange=\"{{ setCardAnswer }}\" required=\"\" rows=\"2\" placeholder=\"U = R × I\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:1rem;resize:vertical;\"><\/textarea>\n                  <\/div>\n                <\/sc-if>\n                <sc-if value=\"{{ cardTypeIsMcq }}\">\n                  <div style=\"margin-bottom:24px;\">\n                    <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Options (sélectionne la bonne réponse)<\/label>\n                    <div style=\"display:flex;flex-direct -index:50;\">\n            <div onclick=\"{{ stopClick }}\" style=\"background:#fff;border-radius:8px;padding:32px;width:100%;max-width:24rem;position:relative;\">\n              <button onclick=\"{{ closeBoxModal }}\" style=\"position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.5rem;color:#9CA3AF;cursor:pointer;\">×<\/button>\n              <h2 style=\"font-size:1.5rem;font-weight:700;margin:0 0 24px;color:#101F56;\">{{ boxModalTitle }}<\/h2>\n              <form onsubmit=\"{{ submitBoxForm }}\">\n                <div style=\"margin-bottom:16px;\">\n                  <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Niveau<\/label>\n                  <input type=\"number\" min=\"1\" value=\"{{ boxForm.level }}\" onchange=\"{{ setBoxFormLevel }}\" required=\"\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:1rem;\">\n                <\/div>\n                <div style=\"margin-bottom:24px;\">\n                  <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Intervalle (secondes)<\/label>\n                  <input type=\"number\" min=\"1\" value=\"{{ boxForm.intervall }}\" onchange=\"{{ setBoxFormIntervall }}\" required=\"\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:1rem;\">\n                <\/div>\n                <div style=\"display:flex;gap:1rem;\">\n                  <button type=\"submit\" style=\"flex:1;background:#1E3BA1;color:#fff;font-weight:700;padding:0.5rem 1rem;border-radius:0.5rem;border:none;cursor:pointer;\">{{ boxSubmitLabel }}<\/button>\n                  <button type=\"button\" onclick=\"{{ closeBoxModal }}\" style=\"flex:1;background:#F3F4F6;color:#374151;font-weight:700;padding:0.5rem 1rem;border-radius:0.5rem;border:none;cursor:pointer;\">Annuler<\/button>\n                <\/div>\n              <\/form>\n            <\/div>\n          <\/div>\n        <\/sc-if>\n      <\/sc-if>\n\n      <!-- ===================== FLASHCARDS SESSION ===================== -->\n      <sc-if value=\"{{ isFlashcardsSession }}\">\n        <div style=\"display:grid;grid-template-columns:1fr;gap:16px;max-width:900px;margin:0 auto;\">\n          <section style=\"padding:20px;background:#fff;border-radius:12px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;\">\n              <button onclick=\"{{ confirmExitSession }}\" style=\"background:none;border:none;color:#1E3BA1;font-weight:600;cursor:pointer;\">← Retour<\/button>\n              <h4 style=\"font-size:1.4rem;font-weight:600;color:#1E3BA1;margin:0;\">Session : {{ sessionSystemName }}<\/h4>\n              <span style=\"font-size:0.85rem;font-weight:700;color:#1E3BA1;background:rgba(30,59,161,0.1);padding:4px 12px;border-radius:999px;\">{{ sessionIndex }} / {{ sessionTotal }}<\/span>\n            <\/div>\n\n            <sc-if value=\"{{ sessionNoCards }}\">\n              <div style=\"text-align:center;padding:40px 0;\">\n                <h3 style=\"font-size:1.5rem;font-weight:700;color:#1E3BA1;margin:0 0 16px;\">Aucune carte à réviser !<\/h3>\n                <button onclick=\"{{ backToFlashcards }}\" style=\"background:#1E3BA1;color:#fff;padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:1rem;\">Retour aux systèmes<\/button>\n              <\/div>\n            <\/sc-if>\n\n            <sc-if value=\"{{ sessionInProgress }}\">\n              <div style=\"display:flex;flex-direction:column;gap:16px;\">\n                <div style=\"width:100%;padding:14px;background:#F7F7F7;color:#101F56;font-size:1.2rem;text-align:center;font-weight:600;border-radius:8px;\">{{ sessionCurrentCard.statement }}<\/div>\n\n                <sc-if value=\"{{ !sessionIsMcq }}\">\n                  <div>\n                    <span style=\"font-size:0.85rem;font-weight:500;color:#6b7280;text-transform:uppercase;\">Ta Réponse<\/span>\n                    <textarea value=\"{{ sessionAnswer }}\" onchange=\"{{ setSessionAnswer }}\" disabled=\"{{ sessionShowFeedback }}\" rows=\"3\" placeholder=\"Saisissez votre réponse...\" style=\"width:100%;padding:12px;border-radius:8px;color:#101F56;border:2px solid #D5DAED;outline:none;margin-top:4px;resize:vertical;\"><\/textarea>\n                  <\/div>\n                <\/sc-if>\n\n                <sc-if value=\"{{ sessionIsMcq }}\">\n                  <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                    <span style=\"font-size:0.85rem;font-weight:500;color:#6b7280;text-transform:uppercase;\">Choisis la bonne réponse<\/span>\n                    <sc-for list=\"{{ sessionMcqOptions }}\" as=\"opt\" hint-placeholder-count=\"3\">\n                      <label style=\"display:flex;align-items:center;gap:12px;padding:12px;border:2px solid {{ opt.style.borderColor }};background:{{ opt.style.background }};border-radius:8px;cursor:pointer;\">\n                        <input type=\"radio\" name=\"session-mcq\" checked=\"{{ opt.checked }}\" onchange=\"{{ opt.select }}\" disabled=\"{{ sessionShowFeedback }}\">\n                        <span style=\"color:#101F56;\">{{ opt.text }}<\/span>\n                      <\/label>\n                    <\/sc-for>\n                  <\/div>\n                <\/sc-if>\n\n                <sc-if value=\"{{ sessionShowFeedback }}\">\n                  <div style=\"{{ sessionCorrection.style }}\">\n                    <p style=\"font-weight:700;margin:0 0 4px;\">{{ sessionCorrection.title }}<\/p>\n                    <sc-if value=\"{{ !sessionCorrection.success }}\"><p style=\"font-size:0.85rem;font-style:italic;margin:4px 0 0;\">Réponse attendue : {{ sessionCorrection.correction }}<\/p><\/sc-if>\n                    <button onclick=\"{{ sessionNext }}\" style=\"margin-top:16px;width:100%;background:#1E3BA1;color:#fff;border:none;padding:10px;border-radius:8px;font-size:1rem;cursor:pointer;\">Continuer<\/button>\n                  <\/div>\n                <\/sc-if>\n                <sc-if value=\"{{ !sessionShowFeedback }}\">\n                  <button onclick=\"{{ validateSession }}\" disabled=\"{{ sessionValidateDisabled }}\" style=\"{{ sessionValidateStyle }}\">Valider<\/button>\n                <\/sc-if>\n              <\/div>\n            <\/sc-if>\n\n            <sc-if value=\"{{ sessionFinished }}\">\n              <div style=\"text-align:center;padding:40px 0;\">\n                <h3 style=\"font-size:1.5rem;font-weight:700;color:#1E3BA1;margin:0 0 16px;\">Session terminée !<\/h3>\n                <p style=\"margin:0 0 24px;\">Vous avez révisé {{ sessionTotal }} cartes.<\/p>\n                <button onclick=\"{{ backToFlashcards }}\" style=\"background:#1E3BA1;color:#fff;padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:1rem;\">Retour aux systèmes<\/button>\n              <\/div>\n            <\/sc-if>\n          <\/section>\n\n          <section style=\"padding:20px;background:#fff;border-radius:12px;\">\n            <h4 style=\"font-size:1.1rem;font-weight:600;color:#1E3BA1;margin:0 0 12px;\">Répartition par boîte<\/h4>\n            <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:8px;text-align:center;\">\n              <sc-for list=\"{{ sessionBoxCounts }}\" as=\"b\" hint-placeholder-count=\"5\">\n                <div style=\"background:#F7F7F7;border-radius:6px;border:1px solid #D5DAED;padding:6px;\">\n                  <div style=\"font-size:10px;text-transform:uppercase;color:#9ca3af;font-weight:700;\">Boîte {{ b.level }}<\/div>\n                  <div style=\"font-size:0.9rem;font-weight:600;color:#1E3BA1;\">{{ b.count }}<\/div>\n                <\/div>\n              <\/sc-for>\n            <\/div>\n          <\/section>\n        <\/div>\n      <\/sc-if>\n\n      <!-- ===================== MINDMAPS LIST ===================== -->\n      <sc-if value=\"{{ isMindmaps }}\">\n        <div style=\"max-width:1100px;margin:0 auto;\">\n          <div style=\"display:flex;gap:16px;align-items:center;margin-bottom:20px;\">\n            <div style=\"position:relative;flex:1;max-width:520px;\">\n              <input type=\"text\" value=\"{{ mmSearch }}\" onchange=\"{{ setMmSearch }}\" placeholder=\"Rechercher une carte mentale...\" style=\"width:100%;padding:12px 40px 12px 16px;border:1px solid #d1d5db;border-radius:8px;outline:none;font-size:0.95rem;\">\n              <span style=\"position:absolute;right:14px;top:12px;color:#9ca3af;\">🔍<\/span>\n            <\/div>\n            <button onclick=\"{{ openMmCreateModal }}\" style=\"margin-left:auto;background:#1E3BA1;color:#fff;font-weight:700;padding:12px 22px;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;\">+ Nouvelle carte<\/button>\n          <\/div>\n          <div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;\">\n            <label style=\"font-size:0.85rem;font-weight:600;color:#101F56;\">Filtrer par sujet :<\/label>\n            <sc-for list=\"{{ mmSubjectPills }}\" as=\"subj\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ subj.onClick }}\" style=\"{{ subj.style }}\">{{ subj.name }}<\/button>\n            <\/sc-for>\n          <\/div>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;\">\n            <sc-for list=\"{{ filteredMindmaps }}\" as=\"mm\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ mm.onOpen }}\" style=\"cursor:pointer;background:#fdfdfd;border:1px solid #e5e7eb;border-radius:14px;padding:20px;aspect-ratio:1.1;display:flex;flex-direction:column;position:relative;\">\n                <button onclick=\"{{ mm.onDeleteClick }}\" style=\"position:absolute;top:14px;right:14px;border:1px solid #d1d5db;background:#fff;border-radius:6px;width:26px;height:26px;cursor:pointer;\">✕<\/button>\n                <div style=\"flex:1;display:flex;align-items:center;justify-content:center;\">\n                  <div style=\"width:64px;height:64px;border-radius:50%;background:rgba(30,59,161,0.08);display:flex;align-items:center;justify-content:center;font-size:26px;\">🗺️<\/div>\n                <\/div>\n                <h3 style=\"font-size:1.05rem;font-weight:600;margin:0 0 4px;color:#101F56;\">{{ mm.name }}<\/h3>\n                <span style=\"font-size:0.75rem;color:#6b7280;\">{{ mm.subjectName }} · {{ mm.nodes }} nœuds<\/span>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n\n        <sc-if value=\"{{ showMmCreateModal }}\">\n          <div onclick=\"{{ closeMmCreateModal }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:50;\">\n            <div onclick=\"{{ stopClick }}\" style=\"background:#fff;border-radius:8px;padding:32px;width:100%;max-width:28rem;position:relative;\">\n              <button onclick=\"{{ closeMmCreateModal }}\" style=\"position:absolute;top:16px;right:16px;background:none;border:none;font-size:1.5rem;color:#9CA3AF;cursor:pointer;\">×<\/button>\n              <h2 style=\"font-size:1.5rem;font-weight:700;margin:0 0 24px;color:#101F56;\">Nouvelle carte mentale<\/h2>\n              <form onsubmit=\"{{ submitMmCreate }}\">\n                <div style=\"margin-bottom:16px;\">\n                  <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Nom<\/label>\n                  <input type=\"text\" value=\"{{ mmCreateForm.name }}\" onchange=\"{{ setMmCreateName }}\" placeholder=\"Ex : Le système solaire\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:1rem;\">\n                <\/div>\n                <div style=\"margin-bottom:24px;\">\n                  <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Sujet<\/label>\n                  <select value=\"{{ mmCreateForm.subjectId }}\" onchange=\"{{ setMmCreateSubject }}\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:1rem;background:#fff;\">\n                    <option value=\"\">— Sans sujet —<\/option>\n                    <sc-for list=\"{{ subjects }}\" as=\"subj\" hint-placeholder-count=\"4\"><option value=\"{{ subj.id }}\">{{ subj.name }}<\/option><\/sc-for>\n                  <\/select>\n                <\/div>\n                <div style=\"display:flex;gap:1rem;\">\n                  <button type=\"submit\" style=\"flex:1;background:#1E3BA1;color:#fff;font-weight:700;padding:0.5rem 1rem;border-radius:0.5rem;border:none;cursor:pointer;\">Créer<\/button>\n                  <button type=\"button\" onclick=\"{{ closeMmCreateModal }}\" style=\"flex:1;background:#F3F4F6;color:#374151;font-weight:700;padding:0.5rem 1rem;border-radius:0.5rem;border:none;cursor:pointer;\">Annuler<\/button>\n                <\/div>\n              <\/form>\n            <\/div>\n          <\/div>\n        <\/sc-if>\n      <\/sc-if>\n\n      <!-- ===================== MINDMAP EDITOR (simplified) ===================== -->\n      <sc-if value=\"{{ isMindmapEditor }}\">\n        <div style=\"max-width:1100px;margin:0 auto;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;\">\n            <button onclick=\"{{ closeMindmapEditor }}\" style=\"background:none;border:none;color:#1E3BA1;font-weight:600;cursor:pointer;\">← Retour<\/button>\n            <h2 style=\"font-size:1.3rem;font-weight:700;margin:0;color:#101F56;\">{{ editorMindmapName }}<\/h2>\n            <span><\/span>\n          <\/div>\n          <div style=\"background:#fff;border:1px dashed #D5DAED;border-radius:16px;height:520px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#9ca3af;\">\n            <div style=\"font-size:42px;\">🗺️<\/div>\n            <p style=\"margin:0;font-size:0.9rem;max-width:360px;text-align:center;\">Éditeur de carte mentale (glisser-déposer des nœuds) — simplifié pour ce prototype.<\/p>\n          <\/div>\n        <\/div>\n      <\/sc-if>\n\n      <!-- ===================== INTERPRETEUR DE FORMULES ===================== -->\n      <sc-if value=\"{{ isInterpreter }}\">\n        <div style=\"max-width:1100px;margin:0 auto;\">\n          <p style=\"margin:0 0 16px;font-size:0.92rem;color:#6b7280;max-width:720px;\">Saisis une formule avec les raccourcis (<code style=\"background:#eff2fb;padding:1px 5px;border-radius:4px;\">over<\/code>, <code style=\"background:#eff2fb;padding:1px 5px;border-radius:4px;\">sqrt<\/code>, <code style=\"background:#eff2fb;padding:1px 5px;border-radius:4px;\">^<\/code>) ou la palette de symboles — le rendu et la vérification des grandeurs s'affichent en direct.<\/p>\n          <div style=\"display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;\">\n\n            <div style=\"flex:1.4;min-width:340px;background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:20px;\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n                <span style=\"font-size:0.95rem;font-weight:700;color:#101F56;\">Éditeur<\/span>\n                <button onclick=\"{{ interpClear }}\" style=\"background:none;border:1px solid #D5DAED;border-radius:8px;padding:4px 12px;font-size:0.8rem;color:#6b7280;cursor:pointer;\">Effacer<\/button>\n              <\/div>\n              <textarea value=\"{{ interpInput }}\" onchange=\"{{ setInterpInput }}\" rows=\"3\" placeholder=\"Ex : E[J] = over(1, 2) * m[kg] * v[m/s]^2\" style=\"width:100%;padding:12px;border:2px solid #D5DAED;border-radius:8px;outline:none;font-size:1rem;font-family:ui-monospace,'Cascadia Code',Consolas,monospace;resize:vertical;color:#101F56;\"><\/textarea>\n              <div style=\"margin-top:14px;border:1px solid #D5DAED;border-radius:10px;overflow:hidden;\">\n                <div style=\"display:flex;gap:2px;padding:6px 6px 0;background:#eff2fb;border-bottom:1px solid #D5DAED;\">\n                  <sc-for list=\"{{ interpTabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n                    <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\/button>\n                  <\/sc-for>\n                <\/div>\n                <div style=\"padding:10px 12px 12px;max-height:200px;overflow-y:auto;\">\n                  <sc-for list=\"{{ interpActiveGroups }}\" as=\"g\" hint-placeholder-count=\"2\">\n                    <div style=\"margin-top:8px;\">\n                      <p style=\"margin:0 0 6px;font-size:0.72rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#828FBC;\">{{ g.name }}<\/p>\n                      <div style=\"display:flex;flex-wrap:wrap;gap:6px;\">\n                        <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"6\">\n                          <button onclick=\"{{ it.onClick }}\" style=\"min-width:40px;padding:7px 10px;background:#F7F7F7;border:1px solid #D5DAED;border-radius:8px;font-size:0.95rem;color:#1E3BA1;cursor:pointer;font-family:Georgia,serif;\">{{ it.label }}<\/button>\n                        <\/sc-for>\n                      <\/div>\n                    <\/div>\n                  <\/sc-for>\n                <\/div>\n              <\/div>\n              <div style=\"margin-top:16px;padding:10px 12px;background:#f8fafc;border-radius:8px;font-size:0.8rem;color:#6b7280;line-height:1.5;\">\n                <strong style=\"color:#374151;\">Raccourcis :<\/strong> <code>over(a, b)<\/code> → fraction · <code>sqrt(x)<\/code> → racine · <code>x^n<\/code> → exposant · <code>Var[unité]<\/code> → annotation d'unité pour la vérification d'homogénéité.\n              <\/div>\n            <\/div>\n\n            <div style=\"flex:1;min-width:300px;display:flex;flex-direction:column;gap:16px;\">\n              <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:20px;\">\n                <span style=\"font-size:0.95rem;font-weight:700;color:#101F56;\">Aperçu du rendu<\/span>\n                <div style=\"margin:18px 0 10px;padding:22px 12px;background:#F7F7F7;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:Georgia,'Times New Roman',serif;font-size:1.7rem;color:#101F56;\">\n                  <span style=\"font-style:italic;\">E<\/span>\n                  <span>=<\/span>\n                  <span style=\"display:inline-flex;flex-direction:column;align-items:center;font-size:1.05rem;line-height:1.2;\">\n                    <span>1<\/span>\n                    <span style=\"border-top:2px solid #101F56;padding:0 7px;\">2<\/span>\n                  <\/span>\n                  <span style=\"font-style:italic;\">m<\/span>\n                  <span style=\"font-style:italic;\">v<sup style=\"font-size:0.95rem;\">2<\/sup><\/span>\n                <\/div>\n                <p style=\"margin:0;font-size:0.75rem;color:#9ca3af;text-align:center;\">Aperçu simulé — rendu KaTeX dans l'application.<\/p>\n              <\/div>\n              <div style=\"background:#ecfdf5;border:1px solid #10B981;border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:10px;\">\n                <span style=\"color:#10B981;font-weight:700;font-size:1.1rem;line-height:1.2;\">✓<\/span>\n                <div>\n                  <p style=\"margin:0;font-size:0.88rem;font-weight:700;color:#065f46;\">Grandeurs homogènes<\/p>\n                  <p style=\"margin:4px 0 0;font-size:0.8rem;color:#047857;\">[J] = [kg]·[m/s]² — la formule est dimensionnellement correcte.<\/p>\n                <\/div>\n              <\/div>\n              <div style=\"background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px;\">\n                <p style=\"margin:0 0 6px;font-size:0.85rem;font-weight:700;color:#101F56;\">Aussi disponible dans…<\/p>\n                <p style=\"margin:0;font-size:0.8rem;color:#6b7280;line-height:1.55;\">Les flashcards Leitner, les exercices et les nœuds de mindmap : bouton <span style=\"display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border:1px solid #D5DAED;border-radius:6px;font-family:Georgia,serif;font-style:italic;color:#1E3BA1;\">ƒ<\/span> à côté des champs, formules insérées entre <code style=\"background:#eff2fb;padding:1px 5px;border-radius:4px;\">$…$<\/code>.<\/p>\n              <\/div>\n            <\/div>\n\n          <\/div>\n        <\/div>\n      <\/sc-if>\n\n      <!-- ===================== EXERCISES LIST ===================== -->\n      <sc-if value=\"{{ isExercises }}\">\n        <div style=\"max-width:1100px;margin:0 auto;\">\n          <div style=\"display:flex;gap:16px;align-items:center;margin-bottom:20px;\">\n            <div style=\"position:relative;flex:1;max-width:520px;\">\n              <input type=\"text\" value=\"{{ exSearch }}\" onchange=\"{{ setExSearch }}\" placeholder=\"Rechercher un exercice...\" style=\"width:100%;padding:12px 40px 12px 16px;border:1px solid #d1d5db;border-radius:8px;outline:none;font-size:0.95rem;\">\n              <span style=\"position:absolute;right:14px;top:12px;color:#9ca3af;\">🔍<\/span>\n            <\/div>\n            <button onclick=\"{{ openCreateExModal }}\" style=\"margin-left:auto;background:#1E3BA1;color:#fff;font-weight:700;padding:12px 22px;border:none;border-radius:8px;cursor:pointer;white-space:nowrap;\">+ Créer un exercice<\/button>\n          <\/div>\n          <div style=\"display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;\">\n            <label style=\"font-size:0.85rem;font-weight:600;color:#101F56;\">Filtrer par sujet :<\/label>\n            <sc-for list=\"{{ exSubjectPills }}\" as=\"subj\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ subj.onClick }}\" style=\"{{ subj.style }}\">{{ subj.name }}<\/button>\n            <\/sc-for>\n          <\/div>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;\">\n            <sc-for list=\"{{ filteredTests }}\" as=\"test\" hint-placeholder-count=\"3\">\n              <div style=\"background:#fdfdfd;border:1px solid #e5e7eb;border-radius:14px;padding:20px;display:flex;flex-direction:column;\">\n                <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;\">\n                  <h3 style=\"font-size:1.2rem;font-weight:600;margin:0;color:#101F56;\">{{ test.name }}<\/h3>\n                  <div style=\"display:flex;gap:6px;flex-shrink:0;\">\n                    <button onclick=\"{{ test.onEdit }}\" title=\"Modifier\" style=\"border:1px solid #d1d5db;background:#fff;border-radius:6px;width:28px;height:28px;cursor:pointer;\">✎<\/button>\n                    <button onclick=\"{{ test.onDelete }}\" title=\"Supprimer\" style=\"border:1px solid #d1d5db;background:#fff;border-radius:6px;width:28px;height:28px;cursor:pointer;\">✕<\/button>\n                  <\/div>\n                <\/div>\n                <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;\">\n                  <span style=\"background:rgba(30,59,161,0.1);color:#1E3BA1;font-size:0.72rem;font-weight:600;padding:3px 10px;border-radius:999px;\">{{ test.subjectName }}<\/span>\n                  <span style=\"background:#f3f4f6;color:#6b7280;font-size:0.72rem;font-weight:600;padding:3px 10px;border-radius:999px;border:1px solid #e5e7eb;\">{{ test.privacyLabel }}<\/span>\n                  <sc-for list=\"{{ test.tags }}\" as=\"tag\" hint-placeholder-count=\"1\">\n                    <span style=\"background:#f3e8ff;color:#7e22ce;font-size:0.72rem;font-weight:600;padding:3px 10px;border-radius:999px;\">{{ tag }}<\/span>\n                  <\/sc-for>\n                <\/div>\n                <span style=\"font-size:0.85rem;color:#6b7280;margin-bottom:14px;\">{{ test.questionCount }} questions<\/span>\n                <button onclick=\"{{ test.onStart }}\" style=\"margin-top:auto;width:100%;background:#fff;border:1px solid #d1d5db;color:#101F56;font-weight:600;padding:8px;border-radius:999px;cursor:pointer;\">Commencer l'exercice<\/button>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n\n        <sc-if value=\"{{ showExModal }}\">\n          <div onclick=\"{{ closeExModal }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:50;overflow-y:auto;padding:40px 16px;\">\n            <div onclick=\"{{ stopClick }}\" style=\"background:#fff;border-radius:8px;padding:32px;width:100%;max-width:42rem;max-height:90vh;overflow-y:auto;position:relative;\">\n              <h2 style=\"font-size:1.5rem;font-weight:700;margin:0 0 24px;color:#101F56;\">{{ exModalTitle }}<\/h2>\n              <form onsubmit=\"{{ submitExForm }}\">\n                <div style=\"margin-bottom:16px;\">\n                  <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Titre de l'exercice<\/label>\n                  <input type=\"text\" value=\"{{ exForm.name }}\" onchange=\"{{ setExFormName }}\" required=\"\" placeholder=\"Ex : Équations du second degré\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:1rem;\">\n                <\/div>\n                <div style=\"margin-bottom:24px;\">\n                  <label style=\"display:block;font-size:0.875rem;font-weight:600;color:#101F56;margin-bottom:8px;\">Sujet<\/label>\n                  <select value=\"{{ exForm.subjectId }}\" onchange=\"{{ setExFormSubject }}\" required=\"\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:1rem;background:#fff;\">\n                    <option value=\"\">— Choisir —<\/option>\n                    <sc-for list=\"{{ subjects }}\" as=\"subj\" hint-placeholder-count=\"4\"><option value=\"{{ subj.id }}\">{{ subj.name }}<\/option><\/sc-for>\n                  <\/select>\n                <\/div>\n\n                <div style=\"margin-bottom:24px;\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;\">\n                    <label style=\"font-size:0.875rem;font-weight:600;color:#101F56;\">Questions<\/label>\n                    <button type=\"button\" onclick=\"{{ addExQuestion }}\" style=\"background:#16a34a;color:#fff;font-weight:700;padding:6px 12px;border-radius:6px;border:2px solid #166534;font-size:0.85rem;cursor:pointer;\">+ Ajouter une question<\/button>\n                  <\/div>\n                  <div style=\"display:flex;flex-direction:column;gap:20px;\">\n                    <sc-for list=\"{{ exFormQuestions }}\" as=\"q\" hint-placeholder-count=\"1\">\n                      <div style=\"background:#f9fafb;border:1px solid #e5e7eb;padding:16px;border-radius:8px;\">\n                        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;\">\n                          <span style=\"font-weight:600;font-size:0.9rem;color:#101F56;\">Question {{ q.idx }}<\/span>\n                          <sc-if value=\"{{ q.canRemove }}\"><button type=\"button\" onclick=\"{{ q.onRemove }}\" style=\"background:none;border:none;color:#ef4444;font-size:0.85rem;font-weight:600;cursor:pointer;\">Supprimer<\/button><\/sc-if>\n                        <\/div>\n                        <div style=\"margin-bottom:10px;\">\n                          <label style=\"display:block;font-size:0.75rem;font-weight:600;color:#6B7280;margin-bottom:4px;\">Type<\/label>\n                          <div style=\"display:flex;gap:8px;\">\n                            <button type=\"button\" onclick=\"{{ q.onTypeOpen }}\" style=\"{{ q.openBtnStyle }}\">Ouverte<\/button>\n                            <button type=\"button\" onclick=\"{{ q.onTypeMcq }}\" style=\"{{ q.mcqBtnStyle }}\">QCM<\/button>\n                          <\/div>\n                        <\/div>\n                        <div style=\"margin-bottom:10px;\">\n                          <label style=\"display:block;font-size:0.75rem;font-weight:600;color:#6B7280;margin-bottom:4px;\">Énoncé<\/label>\n                          <textarea value=\"{{ q.statement }}\" onchange=\"{{ q.onStatement }}\" required=\"\" rows=\"2\" placeholder=\"Entrez l'énoncé de la question\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:0.9rem;resize:vertical;\"><\/textarea>\n                        <\/div>\n                        <sc-if value=\"{{ q.isOpen }}\">\n                          <div>\n                            <label style=\"display:block;font-size:0.75rem;font-weight:600;color:#6B7280;margin-bottom:4px;\">Réponse attendue<\/label>\n                            <textarea value=\"{{ q.answer }}\" onchange=\"{{ q.onAnswer }}\" required=\"\" rows=\"2\" placeholder=\"Réponse correcte\" style=\"width:100%;padding:0.5rem 1rem;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:0.9rem;resize:vertical;\"><\/textarea>\n                          <\/div>\n                        <\/sc-if>\n                        <sc-if value=\"{{ q.isMcq }}\">\n                          <label style=\"display:block;font-size:0.75rem;font-weight:600;color:#6B7280;margin-bottom:6px;\">Options (cocher la bonne réponse)<\/label>\n                          <div style=\"display:flex;flex-direction:column;gap:6px;\">\n                            <sc-for list=\"{{ q.mcqOptions }}\" as=\"opt\" hint-placeholder-count=\"2\">\n                              <div style=\"display:flex;align-items:center;gap:8px;\">\n                                <input type=\"radio\" checked=\"{{ opt.correct }}\" onchange=\"{{ opt.onCorrect }}\">\n                                <input type=\"text\" value=\"{{ opt.text }}\" onchange=\"{{ opt.onText }}\" placeholder=\"Option...\" required=\"\" style=\"flex:1;padding:6px 10px;border:1px solid #D1D5DB;border-radius:0.5rem;outline:none;font-size:0.85rem;\">\n                              <\/div>\n                            <\/sc-for>\n                          <\/div>\n                        <\/sc-if>\n                      <\/div>\n                    <\/sc-for>\n                  <\/div>\n                <\/div>\n\n                <div style=\"display:flex;gap:1rem;\">\n                  <button type=\"submit\" style=\"flex:1;background:#1E3BA1;color:#fff;font-weight:700;padding:0.5rem 1rem;border-radius:0.5rem;border:none;cursor:pointer;\">{{ exSubmitLabel }}<\/button>\n                  <button type=\"button\" onclick=\"{{ closeExModal }}\" style=\"flex:1;background:#F3F4F6;color:#374151;font-weight:700;padding:0.5rem 1rem;border-radius:0.5rem;border:none;cursor:pointer;\">Annuler<\/button>\n                <\/div>\n              <\/form>\n            <\/div>\n          <\/div>\n        <\/sc-if>\n      <\/sc-if>\n\n      <!-- ===================== EXERCISE DETAIL ===================== -->\n      <sc-if value=\"{{ isExerciseDetail }}\">\n        <div style=\"max-width:800px;margin:0 auto;\">\n          <button onclick=\"{{ backToExercises }}\" style=\"margin-bottom:20px;background:#1E3BA1;color:#fff;font-weight:700;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;\">← Retour aux exercices<\/button>\n          <sc-if value=\"{{ exDetailTest }}\">\n            <div style=\"background:#fff;border-radius:12px;padding:32px;\">\n              <h1 style=\"font-size:1.9rem;font-weight:700;margin:0 0 4px;color:#101F56;\">{{ exDetailTest.name }}<\/h1>\n              <p style=\"font-size:0.85rem;color:#9ca3af;margin:0 0 28px;\">{{ exDetailTest.subjectName }}<\/p>\n\n              <sc-if value=\"{{ !exResultsShown }}\">\n                <div style=\"display:flex;flex-direction:column;gap:24px;\">\n                  <sc-for list=\"{{ exDetailTest.questions }}\" as=\"q\" hint-placeholder-count=\"2\">\n                    <div style=\"background:#f9fafb;padding:22px;border-radius:10px;border:1px solid #e5e7eb;\">\n                      <h3 style=\"font-size:1.05rem;font-weight:600;margin:0 0 12px;color:#101F56;\">Question {{ q.idx }}<\/h3>\n                      <p style=\"margin:0 0 16px;color:#374151;\">{{ q.statement }}<\/p>\n                      <sc-if value=\"{{ q.isOpen }}\">\n                        <textarea value=\"{{ q.userAnswer }}\" onchange=\"{{ q.onAnswer }}\" rows=\"3\" placeholder=\"Entrez votre réponse ici...\" style=\"width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;outline:none;font-size:0.95rem;resize:vertical;\"><\/textarea>\n                      <\/sc-if>\n                      <sc-if value=\"{{ q.isMcq }}\">\n                        <div style=\"display:flex;flex-direction:column;gap:8px;\">\n                          <sc-for list=\"{{ q.options }}\" as=\"opt\" hint-placeholder-count=\"3\">\n                            <label style=\"{{ opt.labelStyle }}\">\n                              <input type=\"radio\" checked=\"{{ opt.selected }}\" onchange=\"{{ opt.select }}\">\n                              <span>{{ opt.text }}<\/span>\n                            <\/label>\n                          <\/sc-for>\n                        <\/div>\n                      <\/sc-if>\n                    <\/div>\n                  <\/sc-for>\n                  <button onclick=\"{{ submitExerciseAnswers }}\" style=\"width:100%;background:#1E3BA1;color:#fff;font-weight:700;padding:14px;border-radius:8px;border:none;cursor:pointer;font-size:1rem;\">Vérifier les résultats<\/button>\n                <\/div>\n              <\/sc-if>\n\n              <sc-if value=\"{{ exResultsShown }}\">\n                <div style=\"display:flex;flex-direction:column;gap:20px;\">\n                  <div style=\"background:line             <button onclick=\"{{ resetExercise }}\" style=\"width:100%;background:#4b5563;color:#fff;font-weight:700;padding:14px;border-radius:8px;border:none;cursor:pointer;font-size:1rem;\">Recommencer<\/button>\n                <\/div>\n              <\/sc-if>\n            <\/div>\n          <\/sc-if>\n        <\/div>\n      <\/sc-if>\n\n      <!-- ===================== CLASSROOM ===================== -->\n      <sc-if value=\"{{ isClassroom }}\">\n        <div style=\"max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:20px;\">\n          <sc-if value=\"{{ crHasInvitations }}\">\n            <section style=\"border-radius:16px;border:2px solid rgba(30,59,161,0.4);background:rgba(30,59,161,0.05);padding:16px;\">\n              <h2 style=\"font-size:1.1rem;font-weight:600;color:#1E3BA1;margin:0 0 12px;\">Invitations en attente ({{ crInvitationsCount }})<\/h2>\n              <sc-for list=\"{{ crInvitations }}\" as=\"inv\" hint-placeholder-count=\"1\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;border-radius:12px;border:1px solid #D5DAED;background:#fff;padding:12px 16px;margin-bottom:8px;\">\n                  <div>\n                    <p style=\"font-weight:600;color:#101F56;margin:0;\">{{ inv.groupName }}<\/p>\n                    <p style=\"font-size:0.75rem;color:rgba(16,31,86,0.6);margin:2px 0 0;\">Rôle : {{ inv.roleLabel }} · Invité par {{ inv.invitedBy }}<\/p>\n                  <\/div>\n                  <div style=\"display:flex;gap:8px;\">\n                    <button onclick=\"{{ inv.accept }}\" style=\"border-radius:8px;background:rgba(16,185,129,0.1);color:#10B981;font-weight:600;font-size:0.85rem;padding:6px 12px;border:none;cursor:pointer;\">Accepter<\/button>\n                    <button onclick=\"{{ inv.decline }}\" style=\"border-radius:8px;background:rgba(250,66,56,0.1);color:#FA4238;font-weight:600;font-size:0.85rem;padding:6px 12px;border:none;cursor:pointer;\">Décliner<\/button>\n                  <\/div>\n                <\/div>\n              <\/sc-for>\n            <\/section>\n          <\/sc-if>\n\n          <div style=\"display:flex;align-items:center;gap:8px;\">\n            <span style=\"font-size:0.85rem;color:rgba(16,31,86,0.7);\">Vue :<\/span>\n            <sc-for list=\"{{ crRoles }}\" as=\"r\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ r.onClick }}\" style=\"{{ r.style }}\">{{ r.label }}<\/button>\n            <\/sc-for>\n          <\/div>\n\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;\">\n            <sc-for list=\"{{ crGroupsForRole }}\" as=\"g\" hint-placeholder-count=\"2\">\n              <div style=\"background:#fff;border-radius:14px;border:1px solid #e5e7eb;padding:20px;\">\n                <h3 style=\"font-size:1.1rem;font-weight:600;margin:0 0 6px;color:#101F56;\">{{ g.name }}<\/h3>\n                <p style=\"font-size:0.8rem;color:#9ca3af;margin:0 0 12px;\">{{ g.level }}<\/p>\n                <sc-if value=\"{{ g.isTeacher }}\"><p style=\"font-size:0.85rem;color:#374151;margin:0;\">{{ g.students }} étudiants<\/p><\/sc-if>\n                <sc-if value=\"{{ !g.isTeacher }}\"><p style=\"font-size:0.85rem;color:#374151;margin:0;\">Enseignant : {{ g.teacher }}<\/p><\/sc-if>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n      <\/sc-if>\n\n      <!-- ===================== CALENDAR ===================== -->\n      <sc-if value=\"{{ isCalendar }}\">\n        <div style=\"max-width:900px;margin:0 auto;display:grid;grid-template-columns:1.4fr 1fr;gap:20px;\">\n          <div style=\"background:#fff;border-radius:14px;padding:20px;\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;\">\n              <button onclick=\"{{ calPrevMonth }}\" style=\"border:1px solid #d1d5db;background:#fff;border-radius:6px;width:32px;height:32px;cursor:pointer;\">←<\/button>\n              <h3 style=\"font-size:1.1rem;font-weight:700;margin:0;color:#101F56;text-transform:capitalize;\">{{ calMonthLabel }}<\/h3>\n              <button onclick=\"{{ calNextMonth }}\" style=\"border:1px solid #d1d5db;background:#fff;border-radius:6px;width:32px;height:32px;cursor:pointer;\">→<\/button>\n            <\/div>\n            <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px;\">\n              <sc-for list=\"{{ calWeekdays }}\" as=\"d\" hint-placeholder-count=\"7\"><div style=\"text-align:center;font-size:0.72rem;font-weight:700;color:#9ca3af;\">{{ d }}<\/div><\/sc-for>\n            <\/div>\n            <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:6px;\">\n              <sc-for list=\"{{ calDays }}\" as=\"cell\" hint-placeholder-count=\"35\">\n                <sc-if value=\"{{ cell.blank }}\"><div><\/div><\/sc-if>\n                <sc-if value=\"{{ !cell.blank }}\">\n                  <button onclick=\"{{ cell.select }}\" style=\"{{ cell.style }}\">\n                    {{ cell.day }}\n                    <sc-if value=\"{{ cell.hasEvents }}\"><span style=\"position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:{{ cell.dotColor }};\"><\/span><\/sc-if>\n                  <\/button>\n                <\/sc-if>\n              <\/sc-for>\n            <\/div>\n          <\/div>\n          <div style=\"background:#fff;border-radius:14px;padding:20px;\">\n            <h3 style=\"font-size:1rem;font-weight:700;margin:0 0 14px;color:#101F56;\">Agenda du jour<\/h3>\n            <sc-if value=\"{{ calAgendaEmpty }}\"><p style=\"color:#9ca3af;font-size:0.85rem;\">Aucun événement ce jour-là.<\/p><\/sc-if>\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <sc-for list=\"{{ calAgenda }}\" as=\"ev\" hint-placeholder-count=\"2\">\n                <div style=\"{{ ev.cardStyle }}\">\n                  <p style=\"font-size:0.85rem;font-weight:600;color:#101F56;margin:0;\">{{ ev.name }}<\/p>\n                  <p style=\"font-size:0.75rem;color:#9ca3af;margin:2px 0 0;\">{{ ev.time }} · {{ ev.typeLabel }}<\/p>\n                <\/div>\n              <\/sc-for>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/sc-if>\n\n      <!-- ===================== TODO ===================== -->\n      <sc-if value=\"{{ isTodo }}\">\n        <div style=\"max-width:640px;margin:0 auto;background:#fff;border-radius:14px;overflow:hidden;\">\n          <div style=\"display:flex;flex-wrap:wrap;border-bottom:1px solid #e2e8f0;\">\n            <sc-for list=\"{{ todoTabs }}\" as=\"tab\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ tab.onClick }}\" style=\"{{ tab.style }}\">\n                {{ tab.label }}\n                <sc-if value=\"{{ tab.hasCount }}\"><span style=\"background:#1a1aff;color:#fff;border-radius:99px;font-size:9px;font-weight:700;padding:1px 5px;\">{{ tab.count }}<\/span><\/sc-if>\n              <\/button>\n            <\/sc-for>\n          <\/div>\n          <div style=\"padding:8px 0;\">\n            <sc-if value=\"{{ todoNoItems }}\"><p style=\"font-size:12px;color:#cbd5e1;text-align:center;margin:20px 0;\">Aucun élément<\/p><\/sc-if>\n            <sc-for list=\"{{ todoFilteredItems }}\" as=\"item\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:0.5px solid #f8fafc;\">\n                <sc-if value=\"{{ item.isSession }}\">\n                  <input type=\"checkbox\" checked=\"{{ item.done }}\" onchange=\"{{ item.toggle }}\" style=\"width:16px;height:16px;accent-color:#16a34a;cursor:pointer;flex-shrink:0;\">\n                <\/sc-if>\n                <sc-if value=\"{{ !item.isSession }}\"><span style=\"width:16px;flex-shrink:0;\"><\/span><\/sc-if>\n                <div style=\"flex:1;min-width:0;\">\n                  <div style=\"{{ item.nameStyle }}\">{{ item.name }}<\/div>\n                  <div style=\"font-size:10px;color:#94a3b8;\">{{ item.time }}<\/div>\n                <\/div>\n                <span style=\"{{ item.badgeStyle }}\">{{ item.badgeLabel }}<\/span>\n              <\/div>\n            <\/sc-for>\n          <\/div>\n        <\/div>\n      <\/sc-if>\n\n      <!-- ===================== KPI ===================== -->\n      <sc-if value=\"{{ isKpi }}\">\n        <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:32px;padding-bottom:32px;\">\n\n          <section>\n            <h2 style=\"font-size:1.3rem;font-weight:700;color:#1E3BA1;margin:0 0 12px;\">Succès &amp; Badges<\/h2>\n            <div style=\"display:flex;flex-wrap:wrap;gap:12px;\">\n              <div style=\"display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;border:2px solid #1E3BA1;background:#1E3BA1;color:#fff;font-size:0.9rem;font-weight:500;\"><span>🔥<\/span><span>Série de 4 jours<\/span><\/div>\n              <div style=\"display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;border:2px solid #1E3BA1;background:#1E3BA1;color:#fff;font-size:0.9rem;font-weight:500;\"><span>🃏<\/span><span>100 cartes révisées<\/span><\/div>\n              <div style=\"display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;border:2px solid #e5e7eb;background:#fff;color:#9ca3af;font-size:0.9rem;font-weight:500;\"><span>🏆<\/span><span>Maître d'une matière<\/span><\/div>\n            <\/div>\n          <\/section>\n\n          <section>\n            <h2 style=\"font-size:1.3rem;font-weight:700;color:#1E3BA1;margin:0 0 12px;\">Révision &amp; Régularité<\/h2>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:16px;\">\n              <div style=\"background:#fff;border:2px solid #f3f4f6;border-radius:12px;padding:16px;\"><p style=\"font-size:0.75rem;color:#9ca3af;margin:0 0 4px;\">Sessions planifiées<\/p><p style=\"font-size:1.6rem;font-weight:700;margin:0;color:#1f2937;\">18<\/p><\/div>\n              <div style=\"background:#fff;border:2px solid #f3f4f6;border-radius:12px;padding:16px;\"><p style=\"font-size:0.75rem;color:#9ca3af;margin:0 0 4px;\">Sessions complétées<\/p><p style=\"font-size:1.6rem;font-weight:700;margin:0;color:#1f2937;\">14<\/p><\/div>\n              <div style=\"background:#fff;border:2px solid #f3f4f6;border-radius:12px;padding:16px;\"><p style=\"font-size:0.75rem;color:#9ca3af;margin:0 0 4px;\">Taux de complétion<\/p><p style=\"font-size:1.6rem;font-weight:700;margin:0;color:#1f2937;\">78%<\/p><\/div>\n              <div style=\"background:#fff;border:2px solid #f3f4f6;border-radius:12px;padding:16px;\"><p style=\"font-size:0.75rem;color:#9ca3af;margin:0 0 4px;\">Streak actuel<\/p><p style=\"font-size:1.6rem;font-weight:700;margin:0;color:#1E3BA1;\">4 j<\/p><\/div>\n            <\/div>\n            <div style=\"background:#fff;border:2px solid #f3f4f6;border-radius:12px;padding:16px;\">\n              <p style=\"font-size:0.85rem;font-weight:500;color:#6b7280;margin:0 0 12px;\">Activité hebdomadaire (sessions complétées)<\/p>\n              <div style=\"display:flex;align-items:flex-end;gap:10px;height:130px;\">\n                <sc-for list=\"{{ kpiWeeklyBars }}\" as=\"b\" hint-placeholder-count=\"7\">\n                  <div style=\"{{ b.style }}\"><\/div>\n                <\/sc-for>\n              <\/div>\n            <\/div>\n          <\/section>\n\n          <section>\n            <h2 style=\"font-size:1.3rem;font-weight:700;color:#1E3BA1;margin:0 0 12px;\">Discipline<\/h2>\n            <div style=\"background:#fff;border:2px solid #f3f4f6;border-radius:12px;padding:16px;\">\n              <div style=\"display:flex;justify-content:space-between;font-size:0.75rem;color:#6b7280;margin-bottom:6px;\"><span>Score de discipline (30 jours)<\/span><span>64%<\/span><\/div>\n              <div style=\"width:100%;background:#f3f4f6;  profil<\/h2>\n            <form onsubmit=\"{{ saveProfile }}\" style=\"display:flex;flex-direction:column;gap:16px;\">\n              <div style=\"display:flex;flex-direction:column;gap:4px;\">\n                <label style=\"font-size:0.9rem;color:#374151;\">Nom<\/label>\n                <input type=\"text\" value=\"{{ profileForm.name }}\" onchange=\"{{ setProfileName }}\" style=\"padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.95rem;outline:none;\">\n              <\/div>\n              <div style=\"display:flex;flex-direction:column;gap:4px;\">\n                <label style=\"font-size:0.9rem;color:#374151;\">Email<\/label>\n                <input type=\"email\" value=\"{{ profileForm.email }}\" onchange=\"{{ setProfileEmail }}\" style=\"padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.95rem;outline:none;\">\n              <\/div>\n              <button type=\"submit\" style=\"align-self:flex-start;background:#1E3BA1;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:0.95rem;cursor:pointer;\">Enregistrer<\/button>\n            <\/form>\n          <\/div>\n\n          <div style=\"background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;\">\n            <h2 style=\"font-size:1.1rem;font-weight:600;color:#1E3BA1;margin:0 0 16px;\">Sécurité<\/h2>\n            <form onsubmit=\"{{ changePassword }}\" style=\"display:flex;flex-direction:column;gap:16px;\">\n              <div style=\"display:flex;flex-direction:column;gap:4px;\">\n                <label style=\"font-size:0.9rem;color:#374151;\">Ancien mot de passe<\/label>\n                <input type=\"password\" value=\"{{ pwForm.oldPassword }}\" onchange=\"{{ setPwOld }}\" style=\"padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.95rem;outline:none;\">\n              <\/div>\n              <div style=\"display:flex;flex-direction:column;gap:4px;\">\n                <label style=\"font-size:0.9rem;color:#374151;\">Nouveau mot de passe<\/label>\n                <input type=\"password\" value=\"{{ pwForm.newPassword }}\" onchange=\"{{ setPwNew }}\" style=\"padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.95rem;outline:none;\">\n              <\/div>\n              <div style=\"display:flex;flex-direction:column;gap:4px;\">\n                <label style=\"font-size:0.9rem;color:#374151;\">Confirmer le nouveau mot de passe<\/label>\n                <input type=\"password\" value=\"{{ pwForm.confirmPassword }}\" onchange=\"{{ setPwConfirm }}\" style=\"padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.95rem;outline:none;\">\n              <\/div>\n              <sc-if value=\"{{ pwError }}\"><p style=\"font-size:0.85rem;color:#dc2626;margin:0;\">{{ pwError }}<\/p><\/sc-if>\n              <button type=\"submit\" style=\"align-self:flex-start;background:#1E3BA1;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:0.95rem;cursor:pointer;\">Changer le mot de passe<\/button>\n            <\/form>\n          <\/div>\n\n          <div style=\"background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;display:flex;align-items:center;justify-content:space-between;gap:16px;\">\n            <div>\n              <p style=\"font-weight:500;color:#1f2937;margin:0;\">Déconnexion<\/p>\n              <p style=\"font-size:0.85rem;color:#6b7280;margin:2px 0 0;\">Terminer votre session sur cet appareil.<\/p>\n            <\/div>\n            <button onclick=\"{{ logout }}\" style=\"background:#1E3BA1;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:0.95rem;cursor:pointer;\">Se déconnecter<\/button>\n          <\/div>\n\n          <div style=\"background:#fff5f5;border:1px solid #fca5a5;border-radius:12px;padding:24px;display:flex;flex-direction:column;gap:16px;\">\n            <h2 style=\"font-size:1.1rem;font-weight:600;color:#dc2626;margin:0;\">Zone dangereuse<\/h2>\n            <p style=\"font-size:0.9rem;color:#374151;line-height:1.5;margin:0;\">La suppression de votre compte est <strong>irréversible<\/strong>. Toutes vos données (flashcards, exercices, mind maps, sessions) seront définitivement supprimées.<\/p>\n            <div style=\"display:flex;flex-direction:column;gap:4px;\">\n              <label style=\"font-size:0.9rem;color:#374151;\">Tapez <strong>SUPPRIMER<\/strong> pour confirmer<\/label>\n              <input type=\"text\" value=\"{{ deleteConfirmText }}\" onchange=\"{{ setDeleteConfirmText }}\" placeholder=\"SUPPRIMER\" style=\"padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:0.95rem;outline:none;max-width:240px;\">\n            <\/div>\n            <button onclick=\"{{ deleteAccount }}\" disabled=\"{{ cannotDeleteAccount }}\" style=\"{{ deleteBtnStyle }}\">Supprimer mon compte<\/button>\n          <\/div>\n        <\/section>\n      <\/sc-if>\n\n      <!-- ===================== SETTINGS ===================== -->\n      <sc-if value=\"{{ isSettings }}\">\n        <div style=\"display:flex;gap:0;min-height:calc(100vh - 200px);max-width:900px;margin:0 auto;\">\n          <aside style=\"width:220px;flex-shrink:0;border-right:1px solid #e5e7eb;padding:24px 16px;display:flex;flex-direction:column;gap:24px;\">\n            <div>\n              <p style=\"font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#9ca3af;padding:0 8px;margin:0 0 4px;\">Mon compte<\/p>\n              <button onclick=\"{{ goProfile }}\" style=\"display:block;width:100%;text-align:left;padding:8px 12px;border-radius:8px;font-size:0.9rem;color:#374151;background:none;border:none;cursor:pointer;\">Profil &amp; sécurité<\/button>\n            <\/div>\n            <div>\n              <p style=\"font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#9ca3af;padding:0 8px;margin:0 0 4px;\">Application<\/p>\n              <sc-for list=\"{{ settingsTabs }}\" as=\"tab\" hint-placeholder-count=\"3 on:relative;display:inline-block;width:52px;height:30px;flex-shrink:0;\">\n                  <input type=\"checkbox\" checked=\"{{ alertSettings.enabled }}\" onchange=\"{{ toggleAlertEnabled }}\" style=\"opacity:0;width:0;height:0;\">\n                  <span style=\"{{ enabledTrackStyle }}\"><\/span>\n                  <span style=\"{{ enabledKnobStyle }}\"><\/span>\n                <\/label>\n              <\/div>\n              <sc-if value=\"{{ alertSettings.enabled }}\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 0;border-bottom:1px solid #f3f4f6;\">\n                  <p style=\"font-size:0.95rem;font-weight:500;color:#1f2937;margin:0;\">🔥 Streak en danger<\/p>\n                  <label style=\"position:relative;display:inline-block;width:52px;height:30px;flex-shrink:0;\">\n                    <input type=\"checkbox\" checked=\"{{ alertSettings.streakAlertEnabled }}\" onchange=\"{{ toggleStreak }}\" style=\"opacity:0;width:0;height:0;\">\n                    <span style=\"{{ streakTrackStyle }}\"><\/span>\n                    <span style=\"{{ streakKnobStyle }}\"><\/span>\n                  <\/label>\n                <\/div>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 0;border-bottom:1px solid #f3f4f6;\">\n                  <div><p style=\"font-size:0.95rem;font-weight:500;color:#1f2937;margin:0;\">📉 Discipline basse<\/p><p style=\"font-size:0.82rem;color:#6b7280;margin:2px 0 0;\">Seuil : {{ alertSettings.thresholdDiscipline }}%<\/p><\/div>\n                  <label style=\"position:relative;display:inline-block;width:52px;height:30px;flex-shrink:0;\">\n                    <input type=\"checkbox\" checked=\"{{ alertSettings.disciplineAlertEnabled }}\" onchange=\"{{ toggleDiscipline }}\" style=\"opacity:0;width:0;height:0;\">\n                    <span style=\"{{ disciplineTrackStyle }}\"><\/span>\n                    <span style=\"{{ disciplineKnobStyle }}\"><\/span>\n                  <\/label>\n                <\/div>\n                <sc-if value=\"{{ alertSettings.disciplineAlertEnabled }}\">\n                  <div style=\"display:flex;align-items:center;gap:10px;padding:12px 0;\">\n                    <input type=\"range\" min=\"10\" max=\"80\" step=\"5\" value=\"{{ alertSettings.thresholdDiscipline }}\" onchange=\"{{ setThreshold }}\" style=\"width:160px;accent-color:#1E3BA1;\">\n                    <span style=\"font-size:0.9rem;font-weight:600;color:#1E3BA1;\">{{ alertSettings.thresholdDiscipline }}%<\/span>\n                  <\/div>\n                <\/sc-if>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:16px 0;\">\n                  <p style=\"font-size:0.95rem;font-weight:500;color:#1f2937;margin:0;\">📚 Baisse des scores<\/p>\n                  <label style=\"position:relative;display:inline-block;width:52px;height:30px;flex-shrink:0;\">\n                    <input type=\"checkbox\" checked=\"{{ alertSettings.scoreDropAlertEnabled }}\" onchange=\"{{ toggleScoreDrop }}\" style=\"opacity:0;width:0;height:0;\">\n                    <span style=\"{{ scoreDropTrackStyle }}\"><\/span>\n                    <span style=\"{{ scoreDropKnobStyle }}\"><\/span>\n                  <\/label>\n                <\/div>\n              <\/sc-if>\n            <\/sc-if>\n            <sc-if value=\"{{ isSectionAccessibilite }}\">\n              <h2 style=\"font-size:1.2rem;font-weight:600;color:#1E3BA1;margin:0 0 24px;\">Accessibilité<\/h2>\n              <div style=\"background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:16px 20px;font-size:0.9rem;color:#374151;\">Les options d'accessibilité (taille de police, contraste) seront disponibles dans une prochaine version.<\/div>\n            <\/sc-if>\n          <\/main>\n        <\/div>\n      <\/sc-if>\n\n    <\/main>\n\n    <sc-if value=\"{{ isMobile }}\">\n      <n

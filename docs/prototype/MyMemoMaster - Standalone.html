odo: 'To-do', kpi: 'Ma Progression', profile: 'Profile', settings: 'Settings',\n      interpreter: 'Interpréteur de formules'\n    };\n\n    this.resizeHandler = () => {\n      const mobile = window.innerWidth < 900;\n      if (mobile !== this.state.isMobile) this.setState({ isMobile: mobile });\n    };\n  }\n\n  componentDidMount() {\n    window.addEventListener('resize', this.resizeHandler);\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this.resizeHandler);\n  }\n\n  nav(screen, extra) {\n    this.setState(Object.assign({ screen, bellOpen: false }, extra || {}));\n  }\n\n  toggleBell() { this.setState(s => ({ bellOpen: !s.bellOpen })); }\n\n  // ---------- Interpréteur de formules ----------\n  setInterpInput(e) { this.setState({ interpInput: e.target.value }); }\n  interpInsert(snippet) { this.setState(s => ({ interpInput: (s.interpInput ? s.interpInput + ' ' : '') + snippet })); }\n  interpClear() { this.setState({ interpInput: '' }); }\n\n  goRegister() { this.setState({ isLoginMode: false, loginError: '' }); }\n  goLogin() { this.setState({ isLoginMode: true }); }\n\n  setLoginEmail(e) { this.setState({ loginEmail: e.target.value }); }\n  setLoginPassword(e) { this.setState({ loginPassword: e.target.value }); }\n  setRegisterName(e) { this.setState({ registerName: e.target.value }); }\n  setRegisterEmail(e) { this.setState({ registerEmail: e.target.value }); }\n  setRegisterPassword(e) { this.setState({ registerPassword: e.target.value }); }\n\n  submitLogin(e) {\n    e.preventDefault();\n    if (!this.state.loginEmail || !this.state.loginPassword) {\n      this.setState({ loginError: 'Email ou mot de passe incorrect.' });\n      return;\n    }\n    this.setState({ screen: 'home', loginError: '' });\n  }\n\n  submitRegister(e) {\n    e.preventDefault();\n    this.setState({ screen: 'home', isLoginMode: true });\n  }\n\n  logout() {\n    this.setState({ screen: 'auth', isLoginMode: true, loginEmail: '', loginPassword: '' });\n  }\n\n  icon(paths, size) {\n    size = size || 30;\n    return React.createElement('svg', { width: size, height: size, viewBox: '0 0 35 35', fill: 'none', xmlns: 'http://www.w3.org/2000/svg' },\n      paths.map((d, i) => React.createElement('path', { key: i, d, stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' }))\n    );\n  }\n\n  navStyle(key) {\n    const active = this.state.screen === key || (key === 'flashcards' && this.state.screen.startsWith('flashcards')) || (key === 'exercises' && this.state.screen.startsWith('exercise')) || (key === 'mindmaps' && this.state.screen.startsWith('mindmaps'));\n    return {\n      padding: '12px', borderRadius: '8px', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',\n      background: active ? this.C.primary : this.C.light, color: active ? this.C.light : this.C.primary\n    };\n  }\n\n  // ---------- Flashcards helpers ----------\n  systemStats(sysId) {\n    const cards = this.state.cardsBySystem[sysId] || [];\n    const byLevel = {};\n    cards.forEach(c => { byLevel[c.level] = (byLevel[c.level] || 0) + 1; });\n    return { total: cards.length, byLevel };\n  }\n\n  openCreateSystemModal() {\n    this.setState({ showSystemModal: true, editingSystemId: null, systemForm: { name: '', subjectId: '' } });\n  }\n  openEditSystemModal(sys) {\n    this.setState({ showSystemModal: true, editingSystemId: sys.id, systemForm: { name: sys.name, subjectId: sys.subjectId } });\n  }\n  closeSystemModal() { this.setState({ showSystemModal: false }); }\n  setSystemFormName(e) { this.setState(s => ({ systemForm: Object.assign({}, s.systemForm, { name: e.target.value }) })); }\n  setSystemFormSubject(e) { this.setState(s => ({ systemForm: Object.assign({}, s.systemForm, { subjectId: Number(e.target.value) || '' }) })); }\n  submitSystemForm(e) {\n    e.preventDefault();\n    const { editingSystemId, systemForm } = this.state;\n    if (editingSystemId) {\n      this.setState(s => ({\n        systems: s.systems.map(sys => sys.id === editingSystemId ? Object.assign({}, sys, { name: systemForm.name, subjectId: systemForm.subjectId }) : sys),\n        showSystemModal: false\n      }));\n    } else {\n      const id = Date.now();\n      this.setState(s => ({\n        systems: s.systems.concat([{ id, name: systemForm.name, subjectId: systemForm.subjectId }]),\n        cardsBySystem: Object.assign({}, s.cardsBySystem, { [id]: [] }),\n        systemBoxes: Object.assign({}, s.systemBoxes, { [id]: [{ level: 1, intervall: 10 }, { level: 2, intervall: 60 }, { level: 3, intervall: 300 }] }),\n        showSystemModal: false\n      }));\n    }\n  }\n  deleteSystem(sys) {\n    if (!window.confirm('Supprimer le système \"' + sys.name + '\" ? Cette action est irréversible.')) return;\n    this.setState(s => ({ systems: s.systems.filter(x => x.id !== sys.id) }));\n  }\n\n  openPlanModal(sys) { this.setState({ showPlanModal: true, planningSystemId: sys.id, planForm: { name: sys.name, date: '', startTime: '', endTime: '' } }); }\n  closePlanModal() { this.setState({ showPlanModal: false }); }\n  setPlanForm(field) { return (e) => this.setState(s => ({ planForm: Object.assign({}, s.planForm, { [field]: e.target.value }) })); }\n  submitPlanForm(e) {\n    e.preventDefault();\n    this.setState({ showPlanModal: false });\n    this.pushNotif('Session planifiée : ' + this.state.planForm.name);\n  }\n\n  pushNotif(text) {\n    this.setState(s => ({ }));\n  }\n\n  goToCardsPage(sysId) { this.nav('flashcards-cards', { fcCurrentSystemId: sysId }); }\n  goToSession(sysId) { this.nav('flashcards-session', { sessionSystemId: sysId, sessionIndex: 0, sessionAnswer: '', sessionShowFeedback: false, sessionFinished: false, sessionErrors: [], sessionCorrection: null }); }\n\n  openAddCardModal() {\n    this.setState({ showCardModal: true, editingCardId: null, cardForm: { statement: '', answer: '', type: 'open', mcqOptions: [{ text: '', correct: true }, { text: '', correct: false }] } });\n  }\n  openEditCardModal(card) {\n    this.setState({ showCardModal: true, editingCardId: card.id, cardForm: { statement: card.statement, answer: card.answer || '', type: card.type, mcqOptions: card.options ? card.options.map(o => Object.assign({}, o)) : [{ text: '', correct: true }, { text: '', correct: false }] } });\n  }\n  closeCardModal() { this.setState({ showCardModal: false }); }\n  selectCardType(t) { this.setState(s => ({ cardForm: Object.assign({}, s.cardForm, { type: t, answer: '', mcqOptions: [{ text: '', correct: true }, { text: '', correct: false }] }) })); }\n  setCardStatement(e) { this.setState(s => ({ cardForm: Object.assign({}, s.cardForm, { statement: e.target.value }) })); }\n  setCardAnswer(e) { this.setState(s => ({ cardForm: Object.assign({}, s.cardForm, { answer: e.target.value }) })); }\n  setMcqOptionText(idx, e) {\n    this.setState(s => ({ cardForm: Object.assign({}, s.cardForm, { mcqOptions: s.cardForm.mcqOptions.map((o, i) => i === idx ? Object.assign({}, o, { text: e.target.value }) : o) }) }));\n  }\n  setMcqCorrect(idx) {\n    this.setState(s => ({ cardForm: Object.assign({}, s.cardForm, { mcqOptions: s.cardForm.mcqOptions.map((o, i) => Object.assign({}, o, { correct: i === idx })) }) }));\n  }\n  addMcqOption() { this.setState(s => ({ cardForm: Object.assign({}, s.cardForm, { mcqOptions: s.cardForm.mcqOptions.concat([{ text: '', correct: false }]) }) })); }\n  removeMcqOption(idx) { this.setState(s => ({ cardForm: Object.assign({}, s.cardForm, { mcqOptions: s.cardForm.mcqOptions.filter((_, i) => i !== idx) }) })); }\n\n  submitCardForm(e) {\n    e.preventDefault();\n    const sysId = this.state.fcCurrentSystemId;\n    const f = this.state.cardForm;\n    const cards = this.state.cardsBySystem[sysId] || [];\n    if (this.state.editingCardId) {\n      this.setState(s => ({\n        cardsBySystem: Object.assign({}, s.cardsBySystem, {\n          [sysId]: cards.map(c => c.id === this.state.editingCardId ? Object.assign({}, c, { statement: f.statement, answer: f.answer, type: f.type, options: f.type === 'mcq' ? f.mcqOptions : undefined }) : c)\n        }),\n        showCardModal: false\n      }));\n    } else {\n      const newCard = { id: Date.now(), level: 1, statement: f.statement, answer: f.answer, type: f.type, options: f.type === 'mcq' ? f.mcqOptions : undefined };\n      this.setState(s => ({\n        cardsBySystem: Object.assign({}, s.cardsBySystem, { [sysId]: cards.concat([newCard]) }),\n        showCardModal: false\n      }));\n    }\n  }\n  deleteCard(card) {\n    if (!window.confirm('Supprimer cette carte ?\\\\n\"' + card.statement + '\"')) return;\n    const sysId = this.state.fcCurrentSystemId;\n    this.setState(s => ({ cardsBySystem: Object.assign({}, s.cardsBySystem, { [sysId]: s.cardsBySystem[sysId].filter(c => c.id !== card.id) }) }));\n  }\n\n  openAddBoxModal() { this.setState({ showBoxModal: true, editingBoxLevel: null, boxForm: { level: '', intervall: '' } }); }\n  openEditBoxModal(box) { this.setState({ showBoxModal: true, editingBoxLevel: box.level, boxForm: { level: box.level, intervall: box.intervall } }); }\n  closeBoxModal() { this.setState({ showBoxModal: false }); }\n  setBoxFormLevel(e) { this.setState(s => ({ boxForm: Object.assign({}, s.boxForm, { level: e.target.value }) })); }\n  setBoxFormIntervall(e) { this.setState(s => ({ boxForm: Object.assign({}, s.boxForm, { intervall: e.target.value }) })); }\n  submitBoxForm(e) {\n    e.preventDefault();\n    const sysId = this.state.fcCurrentSystemId;\n    const f = this.state.boxForm;\n    const boxes = this.state.systemBoxes[sysId] || [];\n    if (this.state.editingBoxLevel !== null) {\n      this.setState(s => ({ systemBoxes: Object.assign({}, s.systemBoxes, { [sysId]: boxes.map(b => b.level === this.state.editingBoxLevel ? { level: Number(f.level), intervall: Number(f.intervall) } : b) }), showBoxModal: false }));\n    } else {\n      this.setState(s => ({ systemBoxes: Object.assign({}, s.systemBoxes, { [s

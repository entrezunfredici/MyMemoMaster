{{- if .Values.redis.persistent }}
# StatefulSet avec PVC (prod — données persistées)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mmm.labels" . | nindent 4 }}
    app: {{ .Release.Name }}-redis
spec:
  serviceName: {{ .Release.Name }}-redis
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-redis
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - /bin/sh
            - -c
            - |
              if [ -n "$REDIS_PASS" ]; then
                exec redis-server --requirepass "$REDIS_PASS" --appendonly yes
              else
                exec redis-server --appendonly yes
              fi
          env:
            - name: REDIS_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "mmm.secretName" . }}
                  key: REDIS_PASS
                  optional: true
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.redis.storage }}
{{- else }}
# Deployment sans PVC (preprod — données éphémères acceptables)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mmm.labels" . | nindent 4 }}
    app: {{ .Release.Name }}-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-redis
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - /bin/sh
            - -c
            - |
              if [ -n "$REDIS_PASS" ]; then
                exec redis-server --requirepass "$REDIS_PASS"
              else
                exec redis-server
              fi
          env:
            - name: REDIS_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "mmm.secretName" . }}
                  key: REDIS_PASS
                  optional: true
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
{{- end }}

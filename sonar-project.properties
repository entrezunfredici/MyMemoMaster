# Configuration SonarCloud (SonarQube Cloud)
# projectKey/organization = valeurs générées par SonarCloud à l'import du dépôt GitHub.
# Si SonarCloud affiche des valeurs différentes lors de l'import, aligner ces deux lignes.
sonar.projectKey=entrezunfredici_MyMemoMaster
sonar.organization=entrezunfredici
sonar.projectName=MyMemoMaster

# Sources analysées (monorepo : API Express + front Vue)
sonar.sources=my_memo_master_api,my_memo_master_front/src

# Tests (déclarés séparément — un fichier ne doit pas être indexé à la fois en source et en test)
sonar.tests=my_memo_master_api/test,my_memo_master_front/test
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Exclusions : dépendances, builds, couverture, et le dossier test de l'API
# (inclus dans sonar.sources car à la racine de my_memo_master_api)
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,my_memo_master_api/test/**,my_memo_master_api/public/**

sonar.sourceEncoding=UTF-8
